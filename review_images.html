<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BoardMD — Image Review</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&family=Lato:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080c12; --surface: #0e1420; --surface2: #141c2e;
  --border: #1e2a42; --accent: #3b7fff;
  --rose: #f43f5e; --emerald: #22c55e; --gold: #e8a836;
  --text: #e8edf5; --text-dim: #7a8aa8; --text-faint: #3a4a68;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Lato',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
header{padding:18px 40px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:rgba(8,12,18,.95);backdrop-filter:blur(20px);z-index:100;}
.logo{font-family:'Instrument Serif',serif;font-size:22px;}
.logo span{color:var(--accent);}
.stats{display:flex;gap:24px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-dim);}
.stat-val{color:var(--text);font-weight:500;}
.controls{padding:16px 40px;display:flex;gap:10px;align-items:center;border-bottom:1px solid var(--border);flex-wrap:wrap;}
.filter-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);padding:7px 16px;border-radius:8px;cursor:pointer;font-family:'Lato',sans-serif;font-size:13px;font-weight:700;transition:all .2s;}
.filter-btn:hover,.filter-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(59,127,255,.08);}
.search-input{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:7px 16px;border-radius:8px;font-family:'Lato',sans-serif;font-size:13px;outline:none;width:240px;transition:border-color .2s;}
.search-input:focus{border-color:var(--accent);}
.search-input::placeholder{color:var(--text-faint);}
.kbd-hint{font-size:11px;color:var(--text-faint);font-family:'JetBrains Mono',monospace;margin-left:auto;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;padding:24px 40px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:border-color .2s,transform .15s;position:relative;}
.card:hover{border-color:#2a3a58;transform:translateY(-2px);}
.card.removed{opacity:.25;pointer-events:none;}
.card.kept{border-color:rgba(34,197,94,.4);}
.card.focused{border-color:var(--accent);box-shadow:0 0 0 2px rgba(59,127,255,.2);}
.img-wrap{width:100%;height:180px;overflow:hidden;background:var(--surface2);position:relative;cursor:zoom-in;}
.img-wrap img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s;}
.card:hover .img-wrap img{transform:scale(1.05);}
.zoom-hint{position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,.6);color:#fff;font-size:10px;padding:2px 6px;border-radius:4px;font-family:'JetBrains Mono',monospace;opacity:0;transition:opacity .2s;}
.img-wrap:hover .zoom-hint{opacity:1;}
.img-error{display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-faint);font-size:12px;font-family:'JetBrains Mono',monospace;}
.card-body{padding:12px 14px;}
.answer{font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px;line-height:1.4;}
.img-title{font-size:11px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.deck-tag{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:2px 7px;border-radius:4px;background:rgba(59,127,255,.12);color:var(--accent);margin-bottom:10px;}
.card-actions{display:flex;gap:6px;}
.btn-remove{flex:1;background:rgba(244,63,94,.1);border:1px solid rgba(244,63,94,.3);color:var(--rose);padding:8px 0;border-radius:7px;cursor:pointer;font-family:'Lato',sans-serif;font-size:12px;font-weight:700;transition:all .2s;}
.btn-remove:hover{background:rgba(244,63,94,.2);border-color:var(--rose);}
.btn-keep{flex:1;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:var(--emerald);padding:8px 0;border-radius:7px;cursor:pointer;font-family:'Lato',sans-serif;font-size:12px;font-weight:700;transition:all .2s;}
.btn-keep:hover{background:rgba(34,197,94,.2);border-color:var(--emerald);}
.badge-kept{position:absolute;top:8px;right:8px;background:rgba(34,197,94,.9);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;font-family:'JetBrains Mono',monospace;}
.empty{grid-column:1/-1;text-align:center;padding:80px 0;color:var(--text-faint);font-family:'Instrument Serif',serif;font-size:22px;}
.toast{position:fixed;bottom:32px;right:32px;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:12px 20px;border-radius:10px;font-size:13px;font-weight:700;z-index:999;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}
.toast.success{border-color:var(--emerald);color:var(--emerald);}
.toast.error{border-color:var(--rose);color:var(--rose);}
.loading{text-align:center;padding:80px 40px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;font-size:13px;}
.spinner{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:2000;display:none;align-items:center;justify-content:center;backdrop-filter:blur(6px);}
.modal-overlay.active{display:flex;}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;max-width:90vw;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;width:min(700px,90vw);}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.modal-answer{font-size:18px;font-weight:700;color:var(--text);font-family:'Instrument Serif',serif;}
.modal-deck{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:2px 8px;border-radius:4px;background:rgba(59,127,255,.12);color:var(--accent);margin-top:4px;display:inline-block;}
.modal-close{background:none;border:1px solid var(--border);color:var(--text-dim);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;}
.modal-close:hover{border-color:var(--rose);color:var(--rose);}
.modal-img{flex:1;overflow:hidden;background:var(--surface2);display:flex;align-items:center;justify-content:center;min-height:200px;max-height:60vh;}
.modal-img img{max-width:100%;max-height:100%;object-fit:contain;display:block;}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:10px;align-items:center;}
.modal-credit{font-size:11px;color:var(--text-faint);font-family:'JetBrains Mono',monospace;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.modal-btn-remove{background:rgba(244,63,94,.1);border:1px solid rgba(244,63,94,.3);color:var(--rose);padding:9px 24px;border-radius:8px;cursor:pointer;font-family:'Lato',sans-serif;font-size:13px;font-weight:700;transition:all .2s;}
.modal-btn-remove:hover{background:rgba(244,63,94,.25);border-color:var(--rose);}
.modal-btn-keep{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:var(--emerald);padding:9px 24px;border-radius:8px;cursor:pointer;font-family:'Lato',sans-serif;font-size:13px;font-weight:700;transition:all .2s;}
.modal-btn-keep:hover{background:rgba(34,197,94,.25);border-color:var(--emerald);}
.modal-nav{display:flex;gap:8px;}
.modal-nav-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);padding:8px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;transition:all .2s;}
.modal-nav-btn:hover{border-color:var(--accent);color:var(--accent);}
</style>
</head>
<body>

<header>
  <div class="logo">Board<span>MD</span> <span style="font-size:14px;color:var(--text-dim);font-family:'Lato',sans-serif;font-weight:400;">— Image Review</span></div>
  <div class="stats">
    <span>Total <span class="stat-val" id="stat-total">—</span></span>
    <span>Kept <span class="stat-val" style="color:var(--emerald)" id="stat-kept">0</span></span>
    <span>Removed <span class="stat-val" style="color:var(--rose)" id="stat-removed">0</span></span>
    <span>Pending <span class="stat-val" style="color:var(--gold)" id="stat-pending">—</span></span>
  </div>
</header>

<div class="controls">
  <input class="search-input" type="text" placeholder="Search answer..." id="search-input" oninput="filterCards()">
  <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
  <button class="filter-btn" onclick="setFilter('pending',this)">Pending</button>
  <button class="filter-btn" onclick="setFilter('kept',this)">Kept</button>
  <button class="filter-btn" onclick="setFilter('removed',this)">Removed</button>
  <button class="filter-btn" style="border-color:var(--rose);color:var(--rose)" onclick="removeAllFlagged()">Remove All Flagged</button>
  <span class="kbd-hint">Click image to zoom · K = Keep · R = Remove · ← → Navigate</span>
</div>

<div id="grid" class="grid">
  <div class="loading"><div class="spinner"></div>Loading images from Supabase...</div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <div class="modal-header">
      <div>
        <div class="modal-answer" id="modal-answer"></div>
        <div class="modal-deck" id="modal-deck"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-img">
      <img id="modal-img" src="" alt="">
    </div>
    <div class="modal-footer">
      <div class="modal-credit" id="modal-credit"></div>
      <div class="modal-nav">
        <button class="modal-nav-btn" onclick="modalNav(-1)">← Prev</button>
        <button class="modal-nav-btn" onclick="modalNav(1)">Next →</button>
      </div>
      <button class="modal-btn-remove" onclick="modalAction('remove')">Remove (R)</button>
      <button class="modal-btn-keep" onclick="modalAction('keep')">Keep (K)</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPA_URL = 'https://hwdcgbcnphkmxaasties.supabase.co';
const SUPA_KEY = 'sb_publishable_kgmsWjn-0nH9qxCnNCv0kg_QtU4CEdI';

let allCards = [];
let cardStates = {};
let currentFilter = 'all';
let filteredCards = [];
let modalIdx = -1;

async function loadCards() {
  try {
    let cards = [];
    let offset = 0;
    while (true) {
      const res = await fetch(
        `${SUPA_URL}/rest/v1/cards?select=id,c,deck,img&img=not.is.null&limit=1000&offset=${offset}`,
        { headers: { apikey: SUPA_KEY, Authorization: `Bearer ${SUPA_KEY}` } }
      );
      const batch = await res.json();
      if (!Array.isArray(batch) || batch.length === 0) break;
      cards = cards.concat(batch.filter(c => c.img !== null && c.img !== undefined));
      if (batch.length < 1000) break;
      offset += 1000;
    }
    allCards = cards;
    const savedKept    = JSON.parse(localStorage.getItem('boardmd_kept')    || '[]');
    const savedRemoved = JSON.parse(localStorage.getItem('boardmd_removed') || '[]');
    cards.forEach(c => {
      if (savedRemoved.includes(c.id))   cardStates[c.id] = 'removed';
      else if (savedKept.includes(c.id)) cardStates[c.id] = 'kept';
      else                               cardStates[c.id] = 'pending';
    });
    updateStats();
    renderGrid();
  } catch(e) {
    document.getElementById('grid').innerHTML = `<div class="empty">Error: ${e.message}</div>`;
  }
}

function saveLocal() {
  const kept    = Object.entries(cardStates).filter(([,v])=>v==='kept').map(([k])=>k);
  const removed = Object.entries(cardStates).filter(([,v])=>v==='removed').map(([k])=>k);
  localStorage.setItem('boardmd_kept',    JSON.stringify(kept));
  localStorage.setItem('boardmd_removed', JSON.stringify(removed));
}

function updateStats() {
  const total   = allCards.length;
  const kept    = Object.values(cardStates).filter(s=>s==='kept').length;
  const removed = Object.values(cardStates).filter(s=>s==='removed').length;
  const pending = total - kept - removed;
  document.getElementById('stat-total').textContent   = total;
  document.getElementById('stat-kept').textContent    = kept;
  document.getElementById('stat-removed').textContent = removed;
  document.getElementById('stat-pending').textContent = pending;
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

function filterCards() { renderGrid(); }

function getImg(card) {
  if (!card.img) return null;
  try { return typeof card.img === 'string' ? JSON.parse(card.img) : card.img; }
  catch { return null; }
}

function renderGrid() {
  const search = document.getElementById('search-input').value.toLowerCase();
  filteredCards = allCards.filter(c => {
    const state  = cardStates[c.id] || 'pending';
    const matchF = currentFilter === 'all' || state === currentFilter;
    const matchS = !search || (c.c||'').toLowerCase().includes(search);
    return matchF && matchS;
  });

  const grid = document.getElementById('grid');
  if (filteredCards.length === 0) {
    grid.innerHTML = '<div class="empty">No cards match this filter.</div>';
    return;
  }

  grid.innerHTML = filteredCards.map((card, i) => {
    const img   = getImg(card);
    const state = cardStates[card.id] || 'pending';
    const title = (img?.credit||'').replace('Wikimedia Commons — ','').replace('Wikipedia — ','');
    return `
      <div class="card ${state}" id="card-${card.id}" data-idx="${i}">
        <div class="img-wrap" onclick="openModal(${i})">
          <img src="${img?.url||''}" alt="${card.c||''}"
               onerror="this.parentElement.innerHTML='<div class=\\'img-error\\'>Unavailable</div>'">
          <div class="zoom-hint">click to zoom</div>
          ${state==='kept'?'<div class="badge-kept">KEPT</div>':''}
        </div>
        <div class="card-body">
          <div class="deck-tag">${card.deck||'unknown'}</div>
          <div class="answer">${card.c||''}</div>
          <div class="img-title" title="${title}">${title}</div>
          <div class="card-actions">
            <button class="btn-remove" onclick="removeImage('${card.id}')">Remove</button>
            <button class="btn-keep"   onclick="keepImage('${card.id}')">Keep</button>
          </div>
        </div>
      </div>`;
  }).join('');
}

// ── MODAL ──
function openModal(idx) {
  modalIdx = idx;
  updateModal();
  document.getElementById('modal').classList.add('active');
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
}

function updateModal() {
  const card = filteredCards[modalIdx];
  if (!card) return;
  const img = getImg(card);
  document.getElementById('modal-answer').textContent = card.c || '';
  document.getElementById('modal-deck').textContent   = card.deck || '';
  document.getElementById('modal-img').src            = img?.url || '';
  document.getElementById('modal-img').alt            = card.c || '';
  document.getElementById('modal-credit').textContent = img?.credit || '';
}

function modalNav(dir) {
  modalIdx = Math.max(0, Math.min(filteredCards.length-1, modalIdx + dir));
  updateModal();
}

function modalAction(action) {
  const card = filteredCards[modalIdx];
  if (!card) return;
  if (action === 'remove') removeImage(card.id);
  else keepImage(card.id);
  // Avança para o próximo automaticamente
  if (modalIdx < filteredCards.length - 1) {
    setTimeout(() => { modalIdx++; updateModal(); }, 300);
  } else {
    closeModal();
  }
}

async function removeImage(id) {
  cardStates[id] = 'removed';
  updateStats();
  saveLocal();
  renderGrid();
  try {
    const res = await fetch(`${SUPA_URL}/rest/v1/cards?id=eq.${id}`, {
      method: 'PATCH',
      headers: { apikey: SUPA_KEY, Authorization: `Bearer ${SUPA_KEY}`,
                 'Content-Type': 'application/json', Prefer: 'return=minimal' },
      body: JSON.stringify({ img: null })
    });
    showToast(res.ok ? 'Image removed' : 'Error removing', res.ok ? 'success' : 'error');
  } catch { showToast('Network error', 'error'); }
}

function keepImage(id) {
  cardStates[id] = 'kept';
  updateStats();
  saveLocal();
  renderGrid();
  showToast('Marked as kept', 'success');
}

async function removeAllFlagged() {
  const pending = allCards.filter(c => (cardStates[c.id]||'pending') === 'pending');
  if (!confirm(`Remove all ${pending.length} unreviewed images?`)) return;
  for (const card of pending) {
    await removeImage(card.id);
    await new Promise(r=>setTimeout(r,80));
  }
}

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast show ${type}`;
  setTimeout(() => t.className = 'toast', 2000);
}

// ── KEYBOARD ──
document.addEventListener('keydown', e => {
  const modal = document.getElementById('modal');
  const isOpen = modal.classList.contains('active');
  if (e.key === 'Escape' && isOpen) { closeModal(); return; }
  if (isOpen) {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); modalNav(1); }
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   { e.preventDefault(); modalNav(-1); }
    if (e.key === 'k' || e.key === 'K') modalAction('keep');
    if (e.key === 'r' || e.key === 'R') modalAction('remove');
  }
});

loadCards();
</script>
</body>
</html>
