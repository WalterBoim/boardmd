<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BoardMD — Medical Board Review</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0a0d14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BoardMD">
<link rel="apple-touch-icon" href="/icon-192.png">
<script src="https://js.puter.com/v2/"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════════════════════
   BOARDMD — NEW DESIGN SYSTEM
   Base: boardmd_card.html dark navy
   ══════════════════════════════════════════════════════════════ */
:root {
  --bg:        #0a0d14;
  --surface:   #111520;
  --surface2:  #161c2d;
  --surface3:  #1c2338;
  --border:    rgba(255,255,255,0.07);
  --border2:   rgba(255,255,255,0.12);
  --text:      #eef1ff;
  --text2:     #c8d0ee;
  --muted:     #556080;
  --accent:    #4f8ef7;
  --green:     #00d4aa;
  --amber:     #f59e0b;
  --red:       #ff5370;
  --gold:      #f5a623;
  --radius:    18px;
  --radius-sm: 12px;
  --radius-xs: 8px;
  --fs:        16px;
  /* legacy compat */
  --emerald:   #00d4aa;
  --rose:      #ff5370;
  --again:     #ff5370;
  --hard:      #f59e0b;
  --good:      #00d4aa;
  --easy:      #4f8ef7;
  --text-dim:  #c8d0ee;
  --text-faint:#556080;
  --border-bright: rgba(255,255,255,0.18);
  --accent-dim: rgba(79,142,247,0.12);
  --gold-dim:   rgba(245,166,35,0.12);
  --font-size:  16px;
}
[data-theme="light"] {
  --bg:#f2f4fb; --surface:#fff; --surface2:#e8edf8; --surface3:#dde3f4;
  --border:rgba(0,0,0,.07); --border2:rgba(0,0,0,.12);
  --text:#0d1021; --text2:#3a4060; --muted:#8892b0;
  --accent:#2563eb; --green:#059669; --amber:#d97706; --red:#e11d48;
  --text-dim:#3a4060; --text-faint:#8892b0;
  --border-bright:rgba(0,0,0,.2);
  --accent-dim:rgba(37,99,235,.1);
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html, body { min-height:100%; }
body {
  font-family:'Sora',sans-serif;
  background:var(--bg); color:var(--text);
  font-size:var(--fs); line-height:1.6;
  overflow-x:hidden; max-width:100vw;
}

/* ── SCROLLBARS ── */
::-webkit-scrollbar { width:4px; height:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }

/* ══════════════════════════════════════════════════════════════
   LANDING PAGE
   ══════════════════════════════════════════════════════════════ */
#landing { display:block; }
.nav {
  display:flex; align-items:center; justify-content:space-between;
  padding:18px 40px; position:sticky; top:0; z-index:100;
  background:rgba(10,13,20,.92); backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);
}
[data-theme="light"] .nav { background:rgba(242,244,251,.92); }
.nav-logo { font-family:'Instrument Serif',serif; font-size:22px; letter-spacing:-.3px; }
.nav-logo span { color:var(--accent); }
.nav-links { display:flex; gap:8px; align-items:center; }
.nav-btn {
  background:none; border:1px solid var(--border2); color:var(--muted);
  padding:8px 18px; border-radius:var(--radius-xs); cursor:pointer;
  font-family:'Sora',sans-serif; font-size:12px; font-weight:700;
  letter-spacing:.3px; transition:all .2s;
}
.nav-btn:hover { border-color:var(--accent); color:var(--accent); }
.nav-btn.primary { background:var(--accent); border-color:var(--accent); color:#fff; }
.nav-btn.primary:hover { opacity:.88; }

.hero {
  display:flex; flex-direction:column; align-items:center;
  text-align:center; padding:80px 40px 60px; position:relative; overflow:hidden;
}
.hero::before {
  content:''; position:absolute; inset:0; pointer-events:none;
  background:radial-gradient(ellipse 700px 400px at 50% 30%, rgba(79,142,247,.07) 0%, transparent 70%),
             radial-gradient(ellipse 400px 300px at 20% 80%, rgba(0,212,170,.04) 0%, transparent 60%),
             radial-gradient(ellipse 400px 300px at 80% 80%, rgba(245,166,35,.03) 0%, transparent 60%);
}
.hero-badge {
  display:inline-flex; align-items:center; gap:7px;
  background:rgba(79,142,247,.1); border:1px solid rgba(79,142,247,.25);
  color:var(--accent); padding:6px 14px; border-radius:20px;
  font-size:11px; font-weight:700; letter-spacing:.8px;
  text-transform:uppercase; margin-bottom:28px;
}
.hero-badge::before { content:'●'; font-size:7px; animation:pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
.hero h1 {
  font-family:'Instrument Serif',serif;
  font-size:clamp(40px,6vw,80px); line-height:1.06;
  letter-spacing:-1px; margin-bottom:22px; max-width:860px;
}
.hero h1 em { font-style:italic; color:var(--accent); }
.hero-sub {
  font-size:clamp(14px,1.8vw,17px); color:var(--muted);
  max-width:520px; line-height:1.9; margin-bottom:40px; font-weight:400;
}
.hero-cta { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; margin-bottom:52px; }
.btn-hp {
  background:var(--accent); color:#fff; padding:14px 30px; border-radius:var(--radius-xs);
  font-family:'Sora',sans-serif; font-size:14px; font-weight:700; border:none; cursor:pointer;
  transition:all .2s;
}
.btn-hp:hover { opacity:.88; transform:translateY(-1px); }
.btn-hs {
  background:var(--surface); color:var(--text); padding:14px 30px; border-radius:var(--radius-xs);
  font-family:'Sora',sans-serif; font-size:14px; font-weight:600;
  border:1px solid var(--border2); cursor:pointer; transition:all .2s;
}
.btn-hs:hover { border-color:var(--border-bright); }

.stats-row {
  display:flex; gap:2px; border-radius:var(--radius);
  overflow:hidden; border:1px solid var(--border2);
}
.stat-item { flex:1; padding:20px 24px; background:var(--surface); text-align:center; }
.stat-num {
  font-family:'JetBrains Mono',monospace; font-size:28px;
  color:var(--text); display:block; line-height:1; margin-bottom:4px;
}
.stat-num span { color:var(--accent); }
.stat-label {
  font-size:10px; color:var(--muted); font-weight:700;
  letter-spacing:.8px; text-transform:uppercase;
}

.section { padding:72px 40px; max-width:1160px; margin:0 auto; width:100%; }
.section-label {
  font-size:10px; font-weight:700; letter-spacing:2px;
  text-transform:uppercase; color:var(--accent); margin-bottom:12px;
}
.section-title {
  font-family:'Instrument Serif',serif;
  font-size:clamp(26px,4vw,42px); margin-bottom:14px; line-height:1.15;
}
.section-sub {
  font-size:15px; color:var(--muted); max-width:520px;
  line-height:1.9; margin-bottom:44px;
}

/* Deck cards */
.decks-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:16px; }
.deck-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); padding:26px; cursor:pointer;
  transition:all .25s; position:relative; overflow:hidden;
}
.deck-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:3px;
  opacity:0; transition:opacity .25s;
}
.deck-card.s1::before { background:linear-gradient(90deg,var(--accent),#7c3aed); }
.deck-card.s2::before { background:linear-gradient(90deg,var(--gold),var(--amber)); }
.deck-card.core::before { background:linear-gradient(90deg,var(--green),var(--accent)); }
.deck-card:hover { border-color:var(--border2); transform:translateY(-2px); }
.deck-card:hover::before { opacity:1; }
.deck-icon {
  width:42px; height:42px; border-radius:10px;
  display:flex; align-items:center; justify-content:center; margin-bottom:16px;
}
.deck-card.s1 .deck-icon { background:rgba(79,142,247,.12); }
.deck-card.s2 .deck-icon { background:rgba(245,166,35,.12); }
.deck-card.core .deck-icon { background:rgba(0,212,170,.12); }
.deck-name {
  font-size:10px; font-weight:700; letter-spacing:1.5px;
  text-transform:uppercase; color:var(--muted); margin-bottom:7px;
}
.deck-title { font-family:'Instrument Serif',serif; font-size:20px; margin-bottom:8px; line-height:1.2; }
.deck-desc { font-size:12px; color:var(--muted); line-height:1.8; margin-bottom:18px; }
.deck-tags { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:20px; }
.deck-tag {
  font-size:10px; font-weight:700; padding:3px 9px; border-radius:5px;
  background:var(--surface2); border:1px solid var(--border);
  color:var(--muted); font-family:'JetBrains Mono',monospace;
}
.deck-footer {
  display:flex; align-items:center; justify-content:space-between;
  padding-top:16px; border-top:1px solid var(--border);
}
.deck-count { font-family:'JetBrains Mono',monospace; font-size:12px; }
.deck-count strong { color:var(--text); }
.deck-count span { color:var(--muted); }
.btn-deck {
  display:flex; align-items:center; gap:5px;
  background:none; border:1px solid var(--border); color:var(--muted);
  padding:7px 14px; border-radius:var(--radius-xs); cursor:pointer;
  font-size:11px; font-family:'Sora',sans-serif; font-weight:700;
  transition:all .2s;
}
.deck-card.s1 .btn-deck:hover { border-color:var(--accent); color:var(--accent); }
.deck-card.s2 .btn-deck:hover { border-color:var(--gold); color:var(--gold); }
.deck-card.core .btn-deck:hover { border-color:var(--green); color:var(--green); }

/* Features */
.features-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:14px; }
.feat {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); padding:22px;
}
.feat-icon { width:34px; height:34px; display:flex; align-items:center; justify-content:center; margin-bottom:12px; color:var(--accent); }
.feat-title { font-size:14px; font-weight:700; margin-bottom:6px; }
.feat-desc { font-size:12px; color:var(--muted); line-height:1.8; }

.divider { border:none; border-top:1px solid var(--border); margin:0 40px; }
.footer {
  padding:36px 40px; display:flex; align-items:center;
  justify-content:space-between; border-top:1px solid var(--border);
  flex-wrap:wrap; gap:14px;
}
.footer-logo { font-family:'Instrument Serif',serif; font-size:18px; }
.footer-logo span { color:var(--accent); }
.footer-copy { font-size:11px; color:var(--muted); }

/* ══════════════════════════════════════════════════════════════
   APP SHELL — NEW DESIGN
   ══════════════════════════════════════════════════════════════ */
#app { display:none; min-height:100vh; flex-direction:column; }
#app.active { display:flex; }

/* ── APP HEADER ── */
.app-header {
  background:var(--bg); border-bottom:1px solid var(--border);
  position:sticky; top:0; z-index:200; backdrop-filter:blur(20px);
}
.app-header-top {
  padding:0 16px; height:52px;
  display:flex; align-items:center; justify-content:space-between; gap:10px;
}
.app-logo {
  font-family:'Instrument Serif',serif; font-size:20px;
  cursor:pointer; flex-shrink:0; letter-spacing:-.2px;
}
.app-logo span { color:var(--accent); }

/* Header right controls */
.hdr-right { display:flex; align-items:center; gap:6px; }
.hdr-btn {
  width:32px; height:32px; border-radius:var(--radius-xs);
  border:1px solid var(--border); background:var(--surface);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:all .18s; flex-shrink:0;
}
.hdr-btn:hover { border-color:var(--accent); }
.hdr-btn svg { width:14px; height:14px; stroke:var(--muted); fill:none; stroke-width:2.2; stroke-linecap:round; stroke-linejoin:round; }
.hdr-btn:hover svg { stroke:var(--accent); }
.hdr-btn.accent { background:rgba(79,142,247,.12); border-color:rgba(79,142,247,.3); }
.hdr-btn.accent svg { stroke:var(--accent); }
.hdr-btn.active { background:rgba(79,142,247,.15); border-color:rgba(79,142,247,.4); }
.hdr-divider { width:1px; height:18px; background:var(--border2); flex-shrink:0; margin:0 2px; }

/* Highlight toolbar in header */
.hl-toolbar { display:flex; align-items:center; gap:4px; }
.hl-dot {
  width:18px; height:18px; border-radius:50%;
  cursor:pointer; border:2px solid transparent;
  transition:all .15s; flex-shrink:0;
}
.hl-dot.y { background:rgba(255,214,0,.8); border-color:rgba(200,160,0,.9); }
.hl-dot.g { background:rgba(0,212,170,.7); border-color:rgba(0,160,130,.9); }
.hl-dot.b { background:rgba(79,142,247,.8); border-color:rgba(40,100,220,.9); }
.hl-dot.active { box-shadow:0 0 0 3px rgba(255,255,255,.25); }
.hl-dot:hover { transform:scale(1.15); }

/* Streak badge */
.streak-pill {
  display:flex; align-items:center; gap:5px;
  background:var(--surface2); border:1px solid var(--border);
  border-radius:var(--radius-xs); padding:4px 9px;
  font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:700;
  color:var(--amber); cursor:default;
}
.streak-pill svg { width:11px; height:11px; stroke:var(--amber); fill:none; stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round; }

/* MDCoins badge */
.coin-pill {
  display:flex; align-items:center; gap:5px;
  background:rgba(245,166,35,.08); border:1.5px solid rgba(245,166,35,.3);
  border-radius:var(--radius-xs); padding:4px 9px;
  font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:700;
  color:var(--gold); cursor:pointer; transition:all .15s;
}
.coin-pill:hover { border-color:rgba(245,166,35,.6); }
.coin-pill svg { width:11px; height:11px; stroke:var(--gold); fill:none; stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round; }

/* Font size control */
.font-ctrl {
  display:flex; align-items:center; gap:2px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius-xs); padding:3px 6px;
}
.font-btn {
  width:22px; height:22px; display:flex; align-items:center; justify-content:center;
  cursor:pointer; border:none; background:transparent;
  color:var(--muted); font-family:'Sora',sans-serif; font-weight:700;
  font-size:11px; transition:all .15s; border-radius:4px;
}
.font-btn:hover { background:var(--surface2); color:var(--accent); }
.font-val {
  font-size:11px; font-weight:700; color:var(--text2);
  font-family:'JetBrains Mono',monospace; min-width:18px; text-align:center;
}

/* Auth indicator */
.auth-pill {
  display:flex; align-items:center; gap:6px;
  padding:4px 10px 4px 6px; border-radius:var(--radius-xs);
  border:1px solid rgba(0,212,170,.3); background:rgba(0,212,170,.07);
  cursor:pointer;
}
.auth-avatar {
  width:22px; height:22px; border-radius:50%;
  background:var(--accent); display:flex; align-items:center; justify-content:center;
  font-size:10px; font-weight:800; color:#fff;
  font-family:'JetBrains Mono',monospace; flex-shrink:0;
}
.auth-name {
  font-size:11px; font-weight:700; color:var(--green);
  font-family:'JetBrains Mono',monospace;
  max-width:80px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}

/* ── DECK TABS ROW ── */
.app-header-tabs {
  padding:0 14px; border-top:1px solid var(--border);
  overflow-x:auto; scrollbar-width:none; display:flex; align-items:center; gap:0;
}
.app-header-tabs::-webkit-scrollbar { display:none; }
.tab-group-sep {
  font-size:9px; font-weight:800; letter-spacing:1.2px; text-transform:uppercase;
  color:var(--muted); padding:0 10px; white-space:nowrap; flex-shrink:0;
}
.deck-tab {
  background:none; border:none; border-bottom:2px solid transparent;
  color:var(--muted); padding:10px 12px 9px; cursor:pointer;
  font-size:12px; font-family:'Sora',sans-serif; font-weight:600;
  transition:all .15s; white-space:nowrap; flex-shrink:0;
}
.deck-tab:hover { color:var(--text2); }
.deck-tab.active { color:var(--accent); border-bottom-color:var(--accent); }

/* ── DECK HOME / DASHBOARD ── */
.deck-home {
  display:none; flex:1; flex-direction:column;
  padding:28px 36px; max-width:860px; margin:0 auto; width:100%; gap:22px;
}
.deck-home.active { display:flex; }
.deck-home-title { font-family:'Instrument Serif',serif; font-size:26px; color:var(--text); margin-bottom:4px; }
.deck-home-sub { font-size:12px; color:var(--muted); font-family:'Sora',sans-serif; }

.deck-stats-row { display:flex; gap:10px; }
.ds-pill {
  flex:1; background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius-sm); padding:14px 16px;
  display:flex; flex-direction:column; gap:4px;
}
.ds-pill-num { font-family:'JetBrains Mono',monospace; font-size:22px; font-weight:600; }
.ds-pill-label {
  font-size:10px; font-weight:700; letter-spacing:.6px;
  text-transform:uppercase; color:var(--muted);
}

.deck-manage-wrap {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius-sm); padding:16px 18px;
}
.deck-manage-title {
  font-size:10px; font-weight:700; letter-spacing:.8px;
  text-transform:uppercase; color:var(--muted); margin-bottom:10px;
}
.deck-manage-chips { display:flex; flex-wrap:wrap; gap:6px; }
.deck-chip {
  padding:5px 12px; border-radius:20px; cursor:pointer;
  font-size:11px; font-weight:700; font-family:'Sora',sans-serif;
  border:1px solid var(--border2); color:var(--muted);
  background:var(--surface2); transition:all .15s;
}
.deck-chip.active { background:var(--accent-dim); color:var(--accent); border-color:rgba(79,142,247,.3); }
.step-toggle {
  display:flex; align-items:center; gap:4px; flex-shrink:0;
}
.step-btn {
  padding:5px 14px; border-radius:20px; cursor:pointer;
  font-size:11px; font-weight:700; border:1px solid var(--border2);
  color:var(--muted); background:transparent; transition:all .15s;
}
.step-btn.active.s1 { background:rgba(79,142,247,.12); color:var(--accent); border-color:rgba(79,142,247,.3); }
.step-btn.active.s2 { background:rgba(245,166,35,.12); color:var(--gold); border-color:rgba(245,166,35,.3); }

.deck-table { width:100%; border-collapse:collapse; }
.deck-table thead th {
  padding:10px 14px; text-align:left; font-size:10px; font-weight:700;
  letter-spacing:.8px; text-transform:uppercase; color:var(--muted);
  background:var(--surface2); border-bottom:1px solid var(--border);
}
.deck-table thead th:not(:first-child) { text-align:center; }
.deck-table tbody td { padding:12px 14px; border-bottom:1px solid var(--border); font-size:13px; }
.deck-table tbody tr:last-child td { border-bottom:none; }
.deck-table tbody tr { cursor:pointer; transition:background .12s; background:var(--surface); }
.deck-table tbody tr:hover { background:var(--surface2); }
.deck-table tbody tr.dt-active { background:rgba(79,142,247,.07); }
.deck-table tbody tr.dt-active .dt-name { color:var(--accent); }
.dt-name { font-weight:700; color:var(--text); }
.dt-sub { font-size:10px; color:var(--muted); margin-top:2px; }
.dt-num { text-align:center; font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:600; }
.dt-new { color:var(--accent); }
.dt-lrn { color:var(--amber); }
.dt-rev { color:var(--green); }
.dt-zero { color:var(--muted); opacity:.4; }

.deck-home-actions { display:flex; gap:10px; }
.dh-btn-study {
  background:var(--accent); color:#fff; border:none;
  padding:11px 26px; border-radius:var(--radius-xs);
  font-family:'Sora',sans-serif; font-size:13px; font-weight:700;
  cursor:pointer; transition:all .15s; display:flex; align-items:center; gap:6px;
}
.dh-btn-study:hover { opacity:.88; transform:translateY(-1px); }
.dh-btn-settings {
  background:none; color:var(--muted); border:1px solid var(--border);
  padding:11px 18px; border-radius:var(--radius-xs);
  font-family:'Sora',sans-serif; font-size:13px; font-weight:700;
  cursor:pointer; transition:all .15s; display:flex; align-items:center; gap:6px;
}
.dh-btn-settings:hover { border-color:var(--accent); color:var(--accent); }

/* ── STUDY AREA ── */
.app-layout { display:none; flex:1; min-height:0; }
.app-layout.active { display:flex; }
.sidebar {
  width:180px; flex-shrink:0; overflow-y:auto;
  border-right:1px solid var(--border); padding:12px 8px;
  background:var(--bg);
}
.sys-btn {
  display:flex; align-items:center; justify-content:space-between;
  width:100%; padding:7px 10px; border-radius:var(--radius-xs);
  background:none; border:1px solid transparent; cursor:pointer;
  font-family:'Sora',sans-serif; font-size:11px; font-weight:600;
  color:var(--muted); transition:all .15s; text-align:left; gap:8px;
}
.sys-btn:hover { background:var(--surface); color:var(--text2); }
.sys-btn.active { background:var(--accent-dim); color:var(--accent); border-color:rgba(79,142,247,.2); }
.sys-cnt {
  font-family:'JetBrains Mono',monospace; font-size:10px; font-weight:700;
  color:var(--muted); flex-shrink:0;
}
.sys-btn.active .sys-cnt { color:var(--accent); opacity:.7; }
.sys-sep { height:1px; background:var(--border); margin:6px 4px; }

.study-main { flex:1; overflow-y:auto; display:flex; flex-direction:column; align-items:center; padding:20px 16px 40px; }
.study-inner { width:100%; max-width:640px; display:flex; flex-direction:column; gap:0; }

/* Progress bar */
.progress-wrap { margin-bottom:14px; }
.progress-info {
  display:flex; justify-content:space-between;
  font-size:11px; color:var(--muted);
  font-family:'JetBrains Mono',monospace; margin-bottom:6px;
}
.progress-bar {
  height:4px; background:var(--surface2); border-radius:2px;
  overflow:hidden; display:flex;
}
.bar-seg { height:100%; transition:width .4s ease; }
.bar-again { background:var(--red); }
.bar-hard  { background:var(--amber); }
.bar-good  { background:var(--green); }
.bar-easy  { background:var(--accent); }
.bar-rest  { flex:1; }

/* ── CARD ── */
.card {
  background:var(--surface); border:1px solid var(--border2);
  border-radius:var(--radius); overflow:hidden; margin-bottom:10px;
}
.card-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 18px 8px; border-bottom:1px solid var(--border);
}
.card-meta-left { display:flex; align-items:center; gap:8px; flex:1; min-width:0; }
.card-system {
  font-size:10px; font-weight:700; letter-spacing:1px;
  text-transform:uppercase; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.card-topic { font-size:11px; color:var(--muted); }
.card-right { display:flex; align-items:center; gap:6px; flex-shrink:0; }
.card-qid {
  font-size:10px; font-weight:700; font-family:'JetBrains Mono',monospace;
  color:var(--accent); background:rgba(79,142,247,.1);
  border:1px solid rgba(79,142,247,.2); border-radius:5px; padding:2px 7px;
}
.card-state {
  font-size:10px; font-weight:700; font-family:'JetBrains Mono',monospace;
  padding:2px 7px; border-radius:5px;
}
.card-interval {
  font-size:10px; font-weight:700; font-family:'JetBrains Mono',monospace;
  color:var(--muted);
}
.card-deck-badge {
  font-size:9px; font-weight:700; letter-spacing:.06em; text-transform:uppercase;
  font-family:'JetBrains Mono',monospace; padding:2px 7px; border-radius:20px;
  background:var(--accent-dim); color:var(--accent);
  border:1px solid rgba(79,142,247,.2); white-space:nowrap;
}

/* Toolbar row (font + highlights per card) */
.card-toolbar {
  display:flex; align-items:center; padding:6px 16px;
  border-bottom:1px solid var(--border); gap:4px; background:var(--bg);
}
.toolbar-font { display:flex; align-items:center; gap:2px; }
.tf-btn {
  width:26px; height:26px; display:flex; align-items:center; justify-content:center;
  cursor:pointer; border:none; background:transparent;
  color:var(--muted); font-family:'Sora',sans-serif; font-weight:700;
  font-size:11px; transition:all .15s; border-radius:5px; user-select:none;
}
.tf-btn:active { background:var(--surface2); color:var(--accent); }
.toolbar-sep { width:1px; height:14px; background:var(--border2); margin:0 4px; }
.toolbar-spacer { flex:1; }
.toolbar-chips { display:flex; gap:5px; align-items:center; }
.chip-sm {
  font-size:10px; font-weight:700; letter-spacing:.3px;
  padding:2px 8px; border-radius:999px;
  border:1px solid var(--border2); color:var(--muted);
}
.chip-sm.new { color:var(--accent); border-color:rgba(79,142,247,.3); background:rgba(79,142,247,.08); }
.chip-sm.bid { color:#8b5cf6; border-color:rgba(139,92,246,.25); background:rgba(139,92,246,.07); font-family:'JetBrains Mono',monospace; }
.chip-sm.qid { color:var(--accent); border-color:rgba(79,142,247,.2); background:rgba(79,142,247,.06); font-family:'JetBrains Mono',monospace; }

.card-body { padding:16px 18px 18px; }
.card-question {
  font-size:var(--fs); font-weight:400; line-height:1.85;
  color:var(--text2); user-select:text; -webkit-user-select:text;
  transition:font-size .2s; margin-bottom:14px;
}
.card-question.hl-mode { cursor:crosshair; user-select:none; -webkit-user-select:none; }

/* Options */
.options { display:flex; flex-direction:column; gap:8px; }
.opt-btn {
  display:flex; align-items:center; gap:12px;
  padding:14px 16px; background:var(--surface2);
  border:1.5px solid var(--border); border-radius:var(--radius-sm);
  cursor:pointer; transition:all .18s cubic-bezier(.34,1.56,.64,1);
  position:relative; overflow:hidden; width:100%; text-align:left;
  font-family:'Sora',sans-serif;
}
.opt-btn:hover:not([disabled]) { border-color:var(--border2); background:var(--surface3); transform:translateX(2px); }
.opt-btn:active:not([disabled]) { transform:scale(.99); }
.opt-btn.correct { border-color:var(--green); background:rgba(0,212,170,.07); }
.opt-btn.wrong   { border-color:var(--red); background:rgba(255,83,112,.07); }
.opt-btn.show-correct { border-color:var(--green); background:rgba(0,212,170,.05); opacity:.8; }
.opt-btn.other-wrong  { opacity:.35; cursor:default; }
.opt-btn.eliminated   { opacity:.4; text-decoration:line-through; }
.opt-letter {
  width:28px; height:28px; border-radius:var(--radius-xs);
  background:var(--surface3); display:flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:800; color:var(--muted);
  flex-shrink:0; font-family:'JetBrains Mono',monospace; transition:all .18s;
}
.opt-btn.correct  .opt-letter { background:var(--green); color:#fff; }
.opt-btn.wrong    .opt-letter { background:var(--red); color:#fff; }
.opt-btn.show-correct .opt-letter { background:var(--green); color:#fff; }
.opt-text { font-size:calc(var(--fs) - 1px); font-weight:500; color:var(--text); flex:1; line-height:1.4; transition:font-size .2s; }
.opt-elim {
  position:absolute; right:10px; top:50%; transform:translateY(-50%);
  width:20px; height:20px; display:flex; align-items:center; justify-content:center;
  font-size:11px; color:var(--muted); opacity:0; transition:opacity .15s;
  cursor:pointer; z-index:2; border-radius:4px;
}
.opt-btn:hover .opt-elim { opacity:.6; }
.opt-dist-bar { display:none; }

/* Highlights */
mark.hy { background:rgba(255,214,0,.28); border-bottom:2px solid rgba(255,180,0,.6); border-radius:3px; color:inherit; padding:0 1px; cursor:pointer; }
mark.hg { background:rgba(0,212,170,.22); border-bottom:2px solid rgba(0,180,140,.6); border-radius:3px; color:inherit; padding:0 1px; cursor:pointer; }
mark.hb { background:rgba(79,142,247,.25); border-bottom:2px solid rgba(40,100,220,.6); border-radius:3px; color:inherit; padding:0 1px; cursor:pointer; }
mark.yellow { background:rgba(255,214,0,.28); border-bottom:2px solid rgba(255,180,0,.6); border-radius:3px; color:inherit; padding:0 1px; cursor:pointer; }
mark.green  { background:rgba(0,212,170,.22); border-bottom:2px solid rgba(0,180,140,.6); border-radius:3px; color:inherit; padding:0 1px; cursor:pointer; }
mark.blue   { background:rgba(79,142,247,.25); border-bottom:2px solid rgba(40,100,220,.6); border-radius:3px; color:inherit; padding:0 1px; cursor:pointer; }

/* Explanation */
.explanation { display:none; }
.explanation.visible { display:block; animation:fadeUp .3s ease both; }
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

.correct-box {
  display:flex; align-items:center; gap:10px; padding:12px 18px;
  border-bottom:1px solid var(--border); background:rgba(0,212,170,.05);
}
.correct-tag {
  font-size:9px; font-weight:800; letter-spacing:1.2px;
  text-transform:uppercase; color:var(--green); white-space:nowrap;
}
.exp-correct-inner {
  font-size:calc(var(--fs) - 1px); font-weight:700; color:var(--green);
  transition:font-size .2s;
}
/* legacy */
.exp-correct { padding:12px 18px; border-bottom:1px solid var(--border); background:rgba(0,212,170,.05); }
.exp-correct-inner { font-size:calc(var(--fs) - 1px); font-weight:700; color:var(--green); }

.exp-section { padding:16px 18px 0; }
.exp-section:last-child { padding-bottom:16px; }
.exp-label {
  display:flex; align-items:center; gap:7px; margin-bottom:9px;
  font-size:10px; font-weight:700; letter-spacing:1.2px;
  text-transform:uppercase; color:var(--muted);
}
.exp-label-icon {
  width:20px; height:20px; border-radius:5px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:10px; font-weight:900;
}
.exp-text {
  font-size:var(--fs); font-weight:400; line-height:1.85;
  color:var(--text2); user-select:text; -webkit-user-select:text;
  transition:font-size .2s;
}
.exp-text.hl-mode { cursor:crosshair; user-select:none; -webkit-user-select:none; }
.exp-text strong,.exp-text b { color:var(--text); font-weight:700; }
.exp-text ul,.exp-text ol { padding-left:18px; margin-top:6px; }
.exp-text li { margin-bottom:4px; line-height:1.7; }
.exp-text p { margin-bottom:8px; }

.exp-dist { font-size:calc(var(--fs) - 1px); line-height:1.8; color:var(--text2); }
.dist-item {
  padding:11px 14px; border-radius:var(--radius-xs);
  background:var(--surface2); border:1px solid var(--border);
  margin-bottom:6px; font-size:calc(var(--fs) - 2px); line-height:1.75;
  color:var(--text2); user-select:text;
}
.dist-item strong,.dist-item b { color:var(--red); font-weight:700; }

/* Key Point */
.key-point-wrap { padding:0 18px 14px; }
.key-point-line {
  border-left:3px solid var(--accent);
  background:rgba(79,142,247,.07); border-radius:0 var(--radius-xs) var(--radius-xs) 0;
  padding:12px 14px;
}
.key-point-label {
  font-size:9px; font-weight:800; letter-spacing:1.5px;
  text-transform:uppercase; color:var(--accent);
  display:block; margin-bottom:5px;
}
.usmle-tip-label {
  font-size:9px; font-weight:800; letter-spacing:1.2px;
  text-transform:uppercase; color:var(--amber);
  background:rgba(245,158,11,.1); border:1px solid rgba(245,158,11,.2);
  border-radius:4px; padding:2px 8px; display:inline-block; margin-bottom:6px;
}

/* Card image */
.card-img-wrap { border-top:1px solid var(--border); border-bottom:1px solid var(--border); }
.card-img { width:100%; display:block; }
.card-img-credit {
  padding:5px 14px; font-size:10px; color:var(--muted);
  display:flex; justify-content:space-between; background:var(--surface2);
}

/* Attending panel — inline */
#att-inline-wrap {
  border-top:1px solid var(--border); background:var(--surface);
  animation:fadeUp .25s ease both;
}
.att-collapsed-row {
  height:52px; display:flex; align-items:center; gap:10px;
  padding:0 16px; cursor:pointer; border-bottom:1px solid var(--border);
}
.att-icon-sq {
  width:32px; height:32px; border-radius:var(--radius-xs);
  background:rgba(79,142,247,.12); display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.att-icon-sq svg { width:15px; height:15px; stroke:var(--accent); fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
.att-collapsed-name { font-size:13px; font-weight:700; color:var(--accent); }
.att-collapsed-hint { font-size:11px; color:var(--muted); margin-left:auto; }
.att-body { padding:12px 16px 14px; display:none; }
.att-body.open { display:block; animation:fadeUp .2s ease both; }
.att-btns { display:grid; grid-template-columns:1fr 1fr; gap:7px; margin-bottom:10px; }
.att-btn {
  padding:10px 8px; background:var(--surface2); border:1px solid var(--border);
  border-radius:var(--radius-xs); font-family:'Sora',sans-serif; font-size:11px;
  font-weight:600; color:var(--text2); cursor:pointer; transition:all .15s; text-align:center;
}
.att-btn:active { transform:scale(.96); background:var(--surface3); }
.att-btn.on { background:rgba(79,142,247,.1); border-color:rgba(79,142,247,.3); color:var(--accent); }
.att-input-row { display:flex; gap:7px; }
.att-input {
  flex:1; padding:9px 12px; background:var(--surface2); border:1.5px solid var(--border);
  border-radius:var(--radius-xs); font-family:'Sora',sans-serif; font-size:12px;
  color:var(--text); outline:none; transition:border-color .15s;
}
.att-input:focus { border-color:var(--accent); }
.att-input::placeholder { color:var(--muted); }
.att-ask {
  padding:9px 14px; background:var(--accent); border:none; border-radius:var(--radius-xs);
  font-family:'Sora',sans-serif; font-size:12px; font-weight:700; color:#fff;
  cursor:pointer; transition:all .15s; white-space:nowrap;
}
.att-ask:active { opacity:.85; transform:scale(.95); }
.att-response {
  background:var(--surface2); border:1px solid var(--border);
  border-radius:var(--radius-xs); padding:12px; margin-bottom:10px;
  font-size:12px; line-height:1.75; color:var(--text2); display:none;
}
.att-response.visible { display:block; animation:fadeUp .2s ease both; }
.att-response.loading::after {
  content:''; display:inline-block; width:3px; height:12px;
  background:var(--accent); animation:blink .8s infinite;
  vertical-align:middle; margin-left:3px;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
.att-disc { font-size:10px; color:var(--muted); margin-top:7px; text-align:center; }
.att-usage-line { font-size:10px; color:var(--muted); margin-bottom:8px; text-align:right; }
.att-usage-line.warn { color:var(--red); }

/* Card footer counter */
.card-footer-counter {
  display:flex; align-items:center; justify-content:center; gap:6px;
  padding:8px 18px; border-top:1px solid var(--border);
  font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:700;
}
.cfc-new { color:var(--accent); }
.cfc-lrn { color:var(--amber); }
.cfc-due { color:var(--green); }
.cfc-sep { color:var(--muted); opacity:.5; }
.cfc-active { text-decoration:underline; text-underline-offset:3px; font-weight:900; }

/* Report issue */
.report-btn {
  background:none; border:none; cursor:pointer;
  font-size:10px; font-weight:600; color:var(--muted);
  font-family:'JetBrains Mono',monospace; padding:4px 0; opacity:.5;
  transition:opacity .15s;
}
.report-btn:hover { opacity:1; }

/* FSRS Buttons */
.plain-nav { display:flex; justify-content:center; gap:10px; padding:10px 0 6px; }
.nav-plain-btn {
  padding:8px 20px; background:transparent; border:1px solid var(--border2);
  border-radius:999px; font-family:'Sora',sans-serif; font-size:12px; font-weight:600;
  color:var(--muted); cursor:pointer; transition:all .18s;
}
.nav-plain-btn:active { background:var(--surface2); }

.fsrs-nav { display:none; }
.fsrs-nav.visible { display:block; animation:fadeUp .25s ease both; }
.fsrs-row { display:flex; gap:8px; padding:8px 0; }
.fsrs-btn {
  flex:1; display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:3px; border:none; border-radius:var(--radius-sm);
  padding:11px 6px; cursor:pointer; font-family:'Sora',sans-serif;
  transition:all .18s cubic-bezier(.34,1.56,.64,1);
}
.fsrs-btn:active { transform:scale(.91); }
.fsrs-btn.again { background:rgba(255,83,112,.12); }
.fsrs-btn.hard  { background:rgba(245,158,11,.12); }
.fsrs-btn.good  { background:rgba(0,212,170,.12); }
.fsrs-btn.easy  { background:rgba(79,142,247,.12); }
.fsrs-lbl { font-size:13px; font-weight:800; }
.fsrs-btn.again .fsrs-lbl { color:var(--red); }
.fsrs-btn.hard  .fsrs-lbl { color:var(--amber); }
.fsrs-btn.good  .fsrs-lbl { color:var(--green); }
.fsrs-btn.easy  .fsrs-lbl { color:var(--accent); }
.fsrs-int { font-size:10px; font-weight:600; font-family:'JetBrains Mono',monospace; }
.fsrs-btn.again .fsrs-int { color:rgba(255,83,112,.55); }
.fsrs-btn.hard  .fsrs-int { color:rgba(245,158,11,.55); }
.fsrs-btn.good  .fsrs-int { color:rgba(0,212,170,.55); }
.fsrs-btn.easy  .fsrs-int { color:rgba(79,142,247,.55); }

.kbd-hint {
  text-align:center; font-size:11px; color:var(--muted);
  font-family:'JetBrains Mono',monospace; padding:6px 0 2px;
}
.kbd {
  display:inline-block; padding:1px 5px; border:1px solid var(--border2);
  border-radius:4px; font-family:'JetBrains Mono',monospace; font-size:10px;
  background:var(--surface2); color:var(--text2); margin:0 2px;
}

/* Done screen */
.done-wrap {
  text-align:center; padding:40px 20px;
  display:flex; flex-direction:column; align-items:center; gap:12px;
}
.done-wrap h2 { font-size:22px; font-weight:800; color:var(--text); }
.btn-restart {
  background:var(--accent); color:#fff; border:none; padding:11px 28px;
  border-radius:var(--radius-xs); font-family:'Sora',sans-serif;
  font-size:13px; font-weight:700; cursor:pointer; transition:all .15s;
}
.btn-restart:hover { opacity:.88; }

/* ── PANELS (Leaderboard, Profile, Shelf) ── */
.lb-panel, .profile-panel {
  display:none; flex:1; flex-direction:column;
  padding:28px 36px; max-width:860px; margin:0 auto; width:100%;
  overflow-y:auto;
}
.lb-panel.active, .profile-panel.active { display:flex; }

/* Leaderboard styles */
.lb-header-title { font-family:'Instrument Serif',serif; font-size:26px; margin-bottom:4px; }
.lb-header-sub { font-size:12px; color:var(--muted); margin-bottom:16px; }
.lb-tabs { display:flex; gap:6px; margin-bottom:18px; }
.lb-tab {
  padding:7px 16px; border-radius:20px; cursor:pointer;
  font-size:12px; font-weight:700; border:1px solid var(--border2);
  color:var(--muted); background:transparent; transition:all .15s;
}
.lb-tab.active { background:var(--accent-dim); color:var(--accent); border-color:rgba(79,142,247,.3); }
.lb-podium { display:flex; justify-content:center; gap:0; margin-bottom:20px; align-items:flex-end; }
.lb-podium-item { display:flex; flex-direction:column; align-items:center; min-width:80px; }
.lb-podium-item.rank1 .lbp-avatar { width:54px; height:54px; font-size:18px; }
.lbp-col { display:flex; flex-direction:column; align-items:center; gap:4px; }
.lbp-rank-num { font-size:10px; font-weight:700; color:var(--muted); letter-spacing:.5px; }
.lbp-avatar {
  width:42px; height:42px; border-radius:50%; background:var(--accent);
  display:flex; align-items:center; justify-content:center;
  font-size:16px; font-weight:800; color:#fff; border:2px solid transparent;
}
.lb-podium-item.rank1 .lbp-avatar { background:linear-gradient(135deg,#fbbf24,#f59e0b); border-color:#f59e0b; }
.lb-podium-item.rank2 .lbp-avatar { background:linear-gradient(135deg,#94a3b8,#64748b); }
.lb-podium-item.rank3 .lbp-avatar { background:linear-gradient(135deg,#cd7c3c,#a85f25); }
.lbp-name { font-size:11px; font-weight:700; color:var(--text); text-align:center; max-width:80px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.lbp-pts { font-size:10px; font-weight:700; color:var(--muted); font-family:'JetBrains Mono',monospace; }
.lbp-bar { width:60px; border-top:none; border-radius:4px 4px 0 0; }
.lb-podium-item.rank1 .lbp-bar { height:60px; background:rgba(245,158,11,.18); border:1px solid rgba(245,158,11,.2); border-bottom:none; }
.lb-podium-item.rank2 .lbp-bar { height:40px; background:rgba(100,116,139,.15); border:1px solid rgba(100,116,139,.15); border-bottom:none; }
.lb-podium-item.rank3 .lbp-bar { height:28px; background:rgba(205,124,60,.15); border:1px solid rgba(205,124,60,.15); border-bottom:none; }

.lb-table-wrap { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm); overflow:hidden; }
.lb-table { width:100%; border-collapse:collapse; }
.lb-table thead th {
  padding:10px 14px; font-size:10px; font-weight:700; letter-spacing:.8px;
  text-transform:uppercase; color:var(--muted); background:var(--surface2);
  border-bottom:1px solid var(--border); text-align:left;
}
.lb-table tbody tr { border-bottom:1px solid var(--border); transition:background .1s; }
.lb-table tbody tr:last-child { border-bottom:none; }
.lb-table tbody tr:hover { background:var(--surface2); }
.lb-table tbody tr.me-row { background:rgba(79,142,247,.07); }
.lb-table tbody td { padding:11px 14px; font-size:13px; }
.lb-rank-cell { font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:700; color:var(--muted); width:36px; }
.lb-rank-1 { color:#f59e0b; }
.lb-rank-2 { color:#94a3b8; }
.lb-rank-3 { color:#cd7c3c; }
.lb-avatar-cell { display:flex; align-items:center; gap:10px; }
.lb-avatar-sm { width:30px; height:30px; border-radius:50%; flex-shrink:0; }
.lb-name { font-size:13px; font-weight:700; color:var(--text); }
.lb-name-wrap { display:flex; flex-direction:column; gap:2px; }
.lb-sub { font-size:10px; color:var(--muted); }
.lb-you {
  font-size:9px; font-weight:700; letter-spacing:.5px; text-transform:uppercase;
  background:var(--accent-dim); color:var(--accent); border:1px solid rgba(79,142,247,.25);
  border-radius:4px; padding:1px 5px; margin-left:6px; vertical-align:middle;
}
.lb-level-pill {
  font-size:10px; font-weight:700; font-family:'JetBrains Mono',monospace;
  background:var(--accent-dim); color:var(--accent);
  border:1px solid rgba(79,142,247,.2); border-radius:5px; padding:2px 7px; display:inline-block;
}
.lb-coins-cell { font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:700; text-align:right; }
.lb-streak-cell { font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:700; text-align:right; }
.lb-streak-fire { color:var(--red); margin-left:3px; }
.lb-join-wrap { text-align:center; padding:32px 20px; }
.lb-join-title { font-size:18px; font-weight:800; margin:14px 0 8px; color:var(--text); }
.lb-join-sub { font-size:13px; color:var(--muted); margin-bottom:22px; line-height:1.7; }
.lb-fields { display:flex; flex-direction:column; gap:10px; max-width:400px; margin:0 auto; }
.lb-fields-row { display:flex; gap:10px; }
.lb-field { display:flex; flex-direction:column; gap:4px; flex:1; }
.lb-field label { font-size:11px; font-weight:700; color:var(--muted); letter-spacing:.4px; }
.lb-field input {
  padding:9px 12px; background:var(--surface2); border:1.5px solid var(--border);
  border-radius:var(--radius-xs); font-family:'Sora',sans-serif; font-size:13px;
  color:var(--text); outline:none; transition:border-color .15s;
}
.lb-field input:focus { border-color:var(--accent); }
.lb-join-btn {
  background:var(--accent); color:#fff; border:none; padding:12px;
  border-radius:var(--radius-xs); font-family:'Sora',sans-serif; font-size:13px;
  font-weight:700; cursor:pointer; transition:all .15s; width:100%;
}
.lb-join-btn:hover { opacity:.88; }
.lb-my-name { font-size:12px; color:var(--muted); font-family:'JetBrains Mono',monospace; }

/* Performance */
.profile-panel { gap:20px; }
.badges-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:10px; }
.badge-item {
  background:var(--surface2); border:1px solid var(--border);
  border-radius:var(--radius-sm); padding:14px; text-align:center;
}
.badge-item.earned { border-color:rgba(79,142,247,.25); background:rgba(79,142,247,.06); }
.badge-item.locked { opacity:.4; filter:grayscale(1); }
.badge-icon { width:32px; height:32px; margin:0 auto 8px; }
.badge-icon svg { width:28px; height:28px; stroke:var(--accent); fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
.badge-name { font-size:11px; font-weight:700; color:var(--text); margin-bottom:2px; }
.badge-desc { font-size:10px; color:var(--muted); line-height:1.5; }

/* XP Toast */
.xp-toast {
  position:fixed; bottom:24px; right:20px; z-index:9999;
  display:flex; flex-direction:column; gap:6px; pointer-events:none;
}
.xp-toast-item {
  display:flex; align-items:center; gap:8px;
  background:var(--surface); border:1px solid var(--border2);
  border-radius:var(--radius-xs); padding:8px 12px;
  font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--text2);
  box-shadow:0 4px 16px rgba(0,0,0,.3);
  animation:slideIn .3s ease both;
}
@keyframes slideIn { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }
.xp-toast-item.fade-out { animation:fadeOut .4s ease forwards; }
@keyframes fadeOut { to{opacity:0;transform:translateX(12px)} }
.xp-toast-dot { width:6px; height:6px; border-radius:50%; background:var(--gold); flex-shrink:0; }
.xp-toast-pts { color:var(--gold); font-weight:800; }

/* Level up overlay */
#levelup-overlay {
  display:none; position:fixed; inset:0; z-index:9000;
  background:rgba(10,13,20,.85); backdrop-filter:blur(12px);
  align-items:center; justify-content:center;
}
#levelup-overlay.active { display:flex; }
.levelup-card {
  background:var(--surface); border:1px solid var(--border2);
  border-radius:var(--radius); padding:36px 32px; text-align:center;
  max-width:340px; width:90%; position:relative;
}
.levelup-badge {
  width:64px; height:64px; border-radius:50%;
  background:rgba(79,142,247,.15); border:2px solid rgba(79,142,247,.3);
  display:flex; align-items:center; justify-content:center; margin:0 auto 16px;
}
.levelup-badge svg { width:28px; height:28px; stroke:var(--accent); fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
.levelup-label { font-size:10px; font-weight:800; letter-spacing:2px; text-transform:uppercase; color:var(--accent); margin-bottom:8px; }
.levelup-title { font-size:22px; font-weight:800; color:var(--text); margin-bottom:6px; }
.levelup-desc { font-size:13px; color:var(--muted); line-height:1.7; margin-bottom:16px; }
.levelup-coins { font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--gold); margin-bottom:20px; }
.levelup-btn {
  background:var(--accent); color:#fff; border:none; padding:12px 32px;
  border-radius:var(--radius-xs); font-family:'Sora',sans-serif;
  font-size:13px; font-weight:700; cursor:pointer; transition:all .15s;
}
.levelup-btn:hover { opacity:.88; }

/* Badge overlay */
.badge-overlay {
  position:fixed; inset:0; z-index:9001; background:rgba(10,13,20,.8);
  display:flex; align-items:center; justify-content:center;
}
.badge-modal {
  background:var(--surface); border:1px solid var(--border2);
  border-radius:var(--radius); padding:32px; text-align:center;
  max-width:300px; width:90%;
}
.badge-modal-icon { margin-bottom:14px; }
.badge-modal-icon svg { width:40px; height:40px; stroke:var(--accent); fill:none; stroke-width:1.6; stroke-linecap:round; stroke-linejoin:round; }
.badge-modal h3 { font-size:18px; font-weight:800; margin-bottom:8px; color:var(--text); }
.badge-modal p { font-size:13px; color:var(--muted); margin-bottom:18px; }
.badge-modal button {
  background:var(--accent); color:#fff; border:none; padding:10px 28px;
  border-radius:var(--radius-xs); font-family:'Sora',sans-serif;
  font-size:13px; font-weight:700; cursor:pointer;
}

/* ── OVERLAYS: Settings, QID, BID, Search, Report, Editor ── */
.overlay-base {
  position:fixed; inset:0; z-index:1000;

}
.modal-base {
  background:var(--surface); border:1px solid var(--border2);

  max-width:500px; max-height:90vh; overflow-y:auto;
}
.modal-base h3 { font-size:18px; font-weight:800; margin-bottom:18px; color:var(--text); }

.btn-settings-cancel:hover { border-color:var(--border2); color:var(--text); }
