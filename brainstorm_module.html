<style>
#bs-overlay{display:none;position:fixed;inset:0;z-index:9999;background:var(--bg);flex-direction:column;font-family:'Lato',sans-serif;overflow-y:auto}
#bs-overlay.on{display:flex}
.bs-head{display:flex;align-items:center;justify-content:space-between;padding:18px 28px;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:10}
.bs-title{display:flex;align-items:center;gap:14px;font-family:'Instrument Serif',serif;font-size:26px;color:var(--text)}
.bs-title svg{width:40px;height:40px;flex-shrink:0}
.bs-head-r{display:flex;align-items:center;gap:8px}
.bs-fz{display:flex;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:3px;gap:3px}
.bs-fz button{width:32px;height:32px;border-radius:7px;border:none;background:transparent;color:var(--text);cursor:pointer;font-size:13px;font-weight:700;font-family:inherit}
.bs-fz button.on{background:var(--accent);color:#fff}
.bs-fz span{font-size:11px;color:var(--text-dim);padding:0 8px;min-width:52px;text-align:center}
.bs-ibt{width:36px;height:36px;border-radius:9px;border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;font-family:inherit}
.bs-ibt:hover{border-color:var(--accent);color:var(--accent)}
.bs-body{padding:20px 28px;max-width:1100px;margin:0 auto;width:100%}
.bs-sh{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);margin-bottom:12px}
.bs-mode-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px;margin-bottom:22px}
.bs-mc{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;cursor:pointer;transition:all .15s}
.bs-mc:hover{border-color:var(--accent)}
.bs-mc.on{border-color:var(--accent);background:var(--accent-dim)}
.bs-mc-n{font-weight:700;font-size:14px;color:var(--text);margin-bottom:4px}
.bs-mc-d{font-size:12px;color:var(--text-dim);line-height:1.5}
.bs-dr{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:22px}
.bs-chip{padding:7px 14px;border-radius:18px;background:var(--surface);border:1px solid var(--border);font-size:12px;font-weight:700;cursor:pointer;color:var(--text-dim);font-family:inherit;transition:all .15s}
.bs-chip:hover{border-color:var(--accent)}
.bs-chip.on{background:var(--accent);border-color:var(--accent);color:#fff}
.bs-spr{display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px 18px;margin-bottom:22px}
.bs-spr span.l{font-size:12px;color:var(--text-dim);white-space:nowrap}
.bs-spr input{flex:1;max-width:260px}
.bs-spr span.v{font-size:14px;font-weight:700;color:var(--text);min-width:38px}
.bs-spr span.w{font-size:11px;color:var(--text-faint)}
.bs-cta{width:100%;padding:15px;border:none;border-radius:12px;background:var(--accent);color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.bs-cta:hover{opacity:.9}
.bs-stats-row{display:flex;gap:20px;justify-content:flex-end;padding:0 4px 12px;font-size:12px;color:var(--text-dim)}
.bs-stats-row b{color:var(--text);font-weight:700}
.bs-prog{height:3px;background:var(--surface2);border-radius:2px;margin-bottom:10px;overflow:hidden}
.bs-pf{height:100%;background:var(--accent);width:0%;transition:width .15s}
.bs-sr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.bs-dots{display:flex;gap:5px}
.bs-dot{width:8px;height:8px;border-radius:50%;background:var(--surface2)}
.bs-dot.done{background:var(--accent);opacity:.5}
.bs-dot.act{background:var(--accent);transform:scale(1.4)}
.bs-stxt{font-size:11px;color:var(--text-dim)}
.bs-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;min-height:420px}
.bs-ch{padding:14px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.bs-ct{font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-dim)}
.bs-cm{display:flex;gap:8px;align-items:center}
.bs-db{padding:4px 11px;border-radius:16px;font-size:11px;font-weight:700;background:var(--accent-dim);color:var(--accent)}
.bs-qi{font-size:11px;color:var(--text-faint);font-family:Menlo,monospace}
.bs-sl{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);padding:16px 24px 0}
.bs-vg{padding:12px 24px 20px;line-height:1.85;color:var(--text)}
.bs-vg.compact{padding-bottom:6px}
.fz-md .bs-vg{font-size:16px}.fz-lg .bs-vg{font-size:18px}.fz-xl .bs-vg{font-size:21px}
.fz-md .bs-ph{font-size:18px}.fz-lg .bs-ph{font-size:22px}.fz-xl .bs-ph{font-size:26px}
.fz-md .bs-cho{font-size:15px}.fz-lg .bs-cho{font-size:17px}.fz-xl .bs-cho{font-size:20px}
.fz-md .bs-exp{font-size:14px}.fz-lg .bs-exp{font-size:16px}.fz-xl .bs-exp{font-size:18px}
.fz-md .bs-kpt{font-size:15px}.fz-lg .bs-kpt{font-size:17px}.fz-xl .bs-kpt{font-size:20px}
.bs-hl{background:rgba(232,168,54,.2);color:var(--gold);border-radius:3px;padding:1px 5px;font-weight:600}
.bs-hlb{background:var(--accent-dim);color:var(--accent);border-radius:3px;padding:1px 5px;font-weight:600}
.bs-div{height:1px;background:var(--border)}
.bs-ph{padding:32px 28px;line-height:1.7;color:var(--text);display:flex;align-items:center;min-height:180px;font-weight:500}
.bs-choices{padding:12px 24px;display:flex;flex-direction:column;gap:8px}
.bs-cho{display:flex;gap:12px;padding:13px 16px;border-radius:9px;border:1px solid var(--border);color:var(--text-dim);background:var(--bg);line-height:1.5}
.bs-cho.correct{background:rgba(34,197,94,.08);border-color:#4a9e3a;color:#7dda6a;font-weight:700}
.bs-cho.wrong{opacity:.35}
.bs-cl{font-weight:700;min-width:16px}
.bs-exp{padding:16px 24px;background:var(--surface2);border-top:1px solid var(--border);line-height:1.8;color:var(--text-dim)}
.bs-kp{margin:14px 24px;padding:14px 18px;background:var(--accent-dim);border-left:3px solid var(--accent);border-radius:0 9px 9px 0}
.bs-kpl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:6px}
.bs-kpt{font-weight:600;line-height:1.65;color:var(--text)}
.bs-ctrl{padding:16px 28px;border-top:1px solid var(--border);display:flex;justify-content:center;gap:8px;align-items:center;flex-wrap:wrap;background:var(--bg);position:sticky;bottom:0}
.bs-btn{padding:10px 20px;border-radius:9px;border:1px solid var(--border);background:transparent;font-size:13px;font-weight:700;color:var(--text);cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:6px}
.bs-btn:hover{border-color:var(--accent)}
.bs-btn.pr{background:var(--accent);border-color:var(--accent);color:#fff}
.bs-btn.fl{color:var(--gold)}
.bs-btn.fl.on{background:var(--gold-dim);border-color:var(--gold)}
.bs-spd2{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:9px;background:var(--surface);border:1px solid var(--border);font-size:12px;color:var(--text-dim)}
.bs-spd2 input{width:90px}
.bs-spd2 b{color:var(--text)}
.bs-empty{text-align:center;padding:80px 20px;color:var(--text-dim)}
.bs-empty h3{font-size:20px;color:var(--text);font-family:'Instrument Serif',serif;margin-bottom:8px}
.bs-done{display:flex;flex-direction:column;align-items:center;padding:60px 20px;gap:16px}
.bs-done h2{font-family:'Instrument Serif',serif;font-size:38px;color:var(--text)}
.bs-done-s{display:flex;gap:36px}
.bs-done-s div{text-align:center}
.bs-done-s .n{font-size:28px;font-weight:700;color:var(--accent)}
.bs-done-s .l{font-size:11px;color:var(--text-dim);text-transform:uppercase;font-weight:600}
@media(max-width:700px){
  .bs-head{padding:14px 16px}
  .bs-title{font-size:20px}
  .bs-title svg{width:32px;height:32px}
  .bs-body{padding:14px 16px}
  .bs-mode-grid{grid-template-columns:1fr 1fr}
  .bs-ctrl{padding:12px 14px;gap:6px}
  .bs-btn{padding:9px 12px;font-size:12px}
}
</style>

<div id="bs-overlay">
  <div class="bs-head">
    <div class="bs-title">
      <svg viewBox="0 0 28 28" fill="none">
        <path d="M10 4C7.5 4 6 5.5 6 7.5c0 .8.3 1.5.8 2-.5.5-.8 1.2-.8 2 0 1.5 1 2.5 2.5 2.5-.3.5-.5 1.1-.5 1.7 0 1.7 1.3 3 3 3h0V4zM18 4c2.5 0 4 1.5 4 3.5 0 .8-.3 1.5-.8 2 .5.5.8 1.2.8 2 0 1.5-1 2.5-2.5 2.5.3.5.5 1.1.5 1.7 0 1.7-1.3 3-3 3h0V4z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
        <path d="M16 6L11 14h3L11 22l8-10h-3l1-6z" fill="#e8a836"/>
      </svg>
      BrainStorm Mode
    </div>
    <div class="bs-head-r">
      <div class="bs-fz">
        <button onclick="bsFz(-1)">A−</button>
        <span id="bs-fz-label">Large</span>
        <button onclick="bsFz(1)">A+</button>
      </div>
      <button class="bs-ibt" onclick="bsConfig()" title="Settings">⚙</button>
      <button class="bs-ibt" onclick="closeBrainStorm()" title="Close">✕</button>
    </div>
  </div>

  <div class="bs-body" id="bs-cfg">
    <div class="bs-sh">Review Mode</div>
    <div class="bs-mode-grid">
      <div class="bs-mc on" data-mode="flash" onclick="bsPickMode(this)"><div class="bs-mc-n">Flash mode</div><div class="bs-mc-d">Vignette → answer → Key Point</div></div>
      <div class="bs-mc" data-mode="phrase" onclick="bsPickMode(this)"><div class="bs-mc-n">Key Phrase</div><div class="bs-mc-d">One clinical pearl per card</div></div>
      <div class="bs-mc" data-mode="kp" onclick="bsPickMode(this)"><div class="bs-mc-n">Key Points only</div><div class="bs-mc-d">Ultra-fast pre-exam review</div></div>
      <div class="bs-mc" data-mode="errors" onclick="bsPickMode(this)"><div class="bs-mc-n">Review errors</div><div class="bs-mc-d">Last 24h "Again" cards</div></div>
    </div>
    <div class="bs-sh">Deck</div>
    <div class="bs-dr">
      <button class="bs-chip on" data-deck="all" onclick="bsPickDeck(this)">Step 2 Complete</button>
      <button class="bs-chip" data-deck="boardmd_s2" onclick="bsPickDeck(this)">BoardMD S2</button>
      <button class="bs-chip" data-deck="core" onclick="bsPickDeck(this)">Core S2</button>
      <button class="bs-chip" data-deck="boardmd_s1" onclick="bsPickDeck(this)">BoardMD S1</button>
      <button class="bs-chip" data-deck="s1_core" onclick="bsPickDeck(this)">Core S1</button>
    </div>
    <div class="bs-sh">Speed</div>
    <div class="bs-spr">
      <span class="l">per card</span>
      <input type="range" min="1" max="7" value="3" id="bs-spd-cfg" oninput="bsSpd(this.value)">
      <span class="v" id="bs-spd-v">3s</span>
      <span class="w" id="bs-spd-w">≈ 20/min</span>
    </div>
    <button class="bs-cta" onclick="bsStart()">▶  Start BrainStorm</button>
  </div>

  <div class="bs-body" id="bs-ses" style="display:none">
    <div class="bs-stats-row">
      seen <b id="bs-n-seen">0</b> &nbsp;·&nbsp;
      flagged <b id="bs-n-flag">0</b> &nbsp;·&nbsp;
      time <b id="bs-n-time">0:00</b> &nbsp;·&nbsp;
      total <b id="bs-n-tot">0</b>
    </div>
    <div class="bs-prog"><div class="bs-pf" id="bs-pf"></div></div>
    <div class="bs-sr">
      <div class="bs-dots" id="bs-dots"></div>
      <div class="bs-stxt" id="bs-stxt"></div>
    </div>
    <div class="bs-card" id="bs-card-body"></div>
  </div>

  <div class="bs-ctrl" id="bs-ctrl" style="display:none">
    <button class="bs-btn" onclick="bsGo(-1)">← Back</button>
    <button class="bs-btn pr" id="bs-play-btn" onclick="bsTogglePlay()">▶ Play</button>
    <button class="bs-btn fl" id="bs-flag-btn" onclick="bsDoFlag()">⚑ Flag</button>
    <button class="bs-btn" onclick="bsConfig()">⚙</button>
    <button class="bs-btn pr" onclick="bsGo(1)">Next →</button>
    <div class="bs-spd2">
      <span>speed</span>
      <input type="range" min="1" max="7" value="3" oninput="bsSpd(this.value)">
      <b id="bs-spd-v2">3s</b>
    </div>
  </div>
</div>

<script>
(function(){
const BS={mode:'flash',deck:'all',spd:3000,cards:[],cur:0,ph:0,playing:false,timer:null,clock:null,elapsed:0,flagged:new Set(),seen:new Set(),fz:'lg'};
const SPDS={1:800,2:1500,3:3000,4:5000,5:8000,6:12000,7:20000};
const SLBL={1:'0.8s',2:'1.5s',3:'3s',4:'5s',5:'8s',6:'12s',7:'20s'};
const SWPM={1:'≈75/min',2:'≈40/min',3:'≈20/min',4:'≈12/min',5:'≈7/min',6:'≈5/min',7:'≈3/min'};
const PHS={flash:['vignette','choices','answer','kp'],phrase:['phrase'],kp:['kp'],errors:['vignette','choices','answer','kp']};
const FZLVL=['md','lg','xl'];
const FZNM={md:'Medium',lg:'Large',xl:'X-Large'};
const DKLBL={boardmd_s2:'BoardMD S2',core:'Core S2',boardmd_s1:'BoardMD S1',s1_core:'Core S1',hy:'HY S2',ethics:'Ethics'};

function setupNavBtn(){
  const btn=document.querySelector('.bmd-bottom-nav .nav-center-btn');
  if(!btn)return;
  btn.innerHTML='<svg viewBox="0 0 28 28" width="36" height="36" fill="none"><path d="M10 4C7.5 4 6 5.5 6 7.5c0 .8.3 1.5.8 2-.5.5-.8 1.2-.8 2 0 1.5 1 2.5 2.5 2.5-.3.5-.5 1.1-.5 1.7 0 1.7 1.3 3 3 3h0V4zM18 4c2.5 0 4 1.5 4 3.5 0 .8-.3 1.5-.8 2 .5.5.8 1.2.8 2 0 1.5-1 2.5-2.5 2.5.3.5.5 1.1.5 1.7 0 1.7-1.3 3-3 3h0V4z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M16 6L11 14h3L11 22l8-10h-3l1-6z" fill="#e8a836"/></svg>';
  btn.removeAttribute('onclick');
  btn.onclick=e=>{e.preventDefault();e.stopPropagation();openBrainStorm();};
  btn.style.cssText='width:56px;height:56px;border-radius:16px;display:flex;align-items:center;justify-content:center;';
  const nc=btn.parentElement;
  let lbl=nc.querySelector('.bs-storm-lbl');
  if(!lbl){lbl=document.createElement('div');lbl.className='bs-storm-lbl';nc.appendChild(lbl);}
  lbl.textContent='Storm';
  lbl.style.cssText='font-size:10px;color:var(--gold);font-weight:700;text-align:center;margin-top:5px;';
}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',setupNavBtn);
else setupNavBtn();
[500,1500,3000].forEach(t=>setTimeout(setupNavBtn,t));

function applyFz(){
  const ov=document.getElementById('bs-overlay');
  ov.classList.remove('fz-md','fz-lg','fz-xl');
  ov.classList.add('fz-'+BS.fz);
  const el=document.getElementById('bs-fz-label');
  if(el)el.textContent=FZNM[BS.fz];
  localStorage.setItem('bs-fz',BS.fz);
}
window.bsFz=v=>{
  const i=FZLVL.indexOf(BS.fz);
  BS.fz=FZLVL[Math.max(0,Math.min(FZLVL.length-1,i+v))];
  applyFz();
};
window.bsPickMode=el=>{
  document.querySelectorAll('.bs-mc').forEach(e=>e.classList.remove('on'));
  el.classList.add('on');
  BS.mode=el.dataset.mode;
};
window.bsPickDeck=el=>{
  document.querySelectorAll('.bs-chip').forEach(e=>e.classList.remove('on'));
  el.classList.add('on');
  BS.deck=el.dataset.deck;
};
window.bsSpd=v=>{
  BS.spd=SPDS[v]||3000;
  ['bs-spd-v','bs-spd-v2'].forEach(id=>{const e=document.getElementById(id);if(e)e.textContent=SLBL[v];});
  const w=document.getElementById('bs-spd-w');if(w)w.textContent=SWPM[v];
  ['bs-spd-cfg'].forEach(id=>{const e=document.getElementById(id);if(e)e.value=v;});
  localStorage.setItem('bs-spd',v);
  if(BS.playing){clearInterval(BS.timer);BS.timer=setInterval(advance,BS.spd);}
};
function getCards(){
  const D=window.DECKS||{};
  let c=BS.deck==='all'?[...(D.boardmd_s2||[]),...(D.core||[])]:D[BS.deck]||[];
  if(BS.mode==='errors'){
    const ago=Date.now()-86400000;const fs=window.fsrsState||{};
    c=c.filter(x=>{const s=fs[x.id];return s&&s.lastRating==='again'&&s.lastReview>ago;});
  }
  return c.slice().sort(()=>Math.random()-.5);
}
function getChoices(card){
  try{const r=card.c;const c=typeof r==='string'?JSON.parse(r):(r||[]);return Array.isArray(c)?c:[];}
  catch(e){return[];}
}
function hl(t){return t?String(t).replace(/\*\*(.+?)\*\*/g,'<span class="bs-hlb">$1</span>'):''}
function renderDots(){
  const phs=PHS[BS.mode]||PHS.flash;
  const el=document.getElementById('bs-dots');if(!el)return;
  el.innerHTML=phs.map((_,i)=>`<div class="bs-dot${i<BS.ph?' done':i===BS.ph?' act':''}"></div>`).join('');
}
function render(){
  const el=document.getElementById('bs-card-body');if(!el)return;
  if(!BS.cards.length){el.innerHTML='<div class="bs-empty"><h3>No cards available</h3><p>Try another mode or deck</p></div>';return;}
  if(BS.cur>=BS.cards.length){showDone();return;}
  const card=BS.cards[BS.cur];
  const phs=PHS[BS.mode]||PHS.flash;
  const ph=phs[BS.ph]||phs[0];
  BS.seen.add(card.id);
  const sn=document.getElementById('bs-n-seen');if(sn)sn.textContent=BS.seen.size;
  const fn=document.getElementById('bs-n-flag');if(fn)fn.textContent=BS.flagged.size;
  const tn=document.getElementById('bs-n-tot');if(tn)tn.textContent=BS.cards.length;
  const pf=document.getElementById('bs-pf');if(pf)pf.style.width=Math.round(BS.cur/BS.cards.length*100)+'%';
  const st=document.getElementById('bs-stxt');
  const phn={vignette:'Vignette',choices:'Choices',answer:'Answer',kp:'Key Point',phrase:'Phrase'};
  if(st)st.textContent=`Card ${BS.cur+1} of ${BS.cards.length} · ${phn[ph]||''}`;
  renderDots();
  const topic=(card.topic||card.subject||'Card').toUpperCase();
  const dk=DKLBL[card.deck]||(card.deck||'').toUpperCase();
  const qid=card.qid?`QID ${card.qid}`:`#${(card.id||'').toString().slice(-5)}`;
  let h=`<div class="bs-ch"><span class="bs-ct">${topic}</span><div class="bs-cm"><span class="bs-db">${dk}</span><span class="bs-qi">${qid}</span></div></div>`;
  if(ph==='vignette'){
    h+=`<div class="bs-sl">Vignette</div><div class="bs-vg">${card.q||''}</div>`;
  }else if(ph==='phrase'){
    h+=`<div class="bs-ph">${hl(card.phrase||card.kp||'<em>phrase not generated yet</em>')}</div>`;
  }else if(ph==='choices'){
    h+=`<div class="bs-sl">Vignette</div><div class="bs-vg compact">${card.q||''}</div><div class="bs-div"></div><div class="bs-choices">`;
    getChoices(card).forEach((c,i)=>{h+=`<div class="bs-cho"><span class="bs-cl">${String.fromCharCode(65+i)}.</span>${c.text||c.t||c}</div>`;});
    h+=`</div>`;
  }else if(ph==='answer'){
    h+=`<div class="bs-sl">Answer</div><div class="bs-vg compact">${card.q||''}</div><div class="bs-div"></div><div class="bs-choices">`;
    getChoices(card).forEach((c,i)=>{h+=`<div class="bs-cho${c.correct?' correct':' wrong'}"><span class="bs-cl">${String.fromCharCode(65+i)}.</span>${c.text||c.t||c}</div>`;});
    h+=`</div>`;
    if(card.e)h+=`<div class="bs-exp">${card.e}</div>`;
  }else if(ph==='kp'){
    if(card.kp)h+=`<div class="bs-kp"><div class="bs-kpl">Key Point</div><div class="bs-kpt">${card.kp}</div></div>`;
    if(card.phrase&&BS.mode!=='kp')h+=`<div class="bs-exp"><strong>Phrase:</strong> ${hl(card.phrase)}</div>`;
  }
  el.innerHTML=h;
  const fb=document.getElementById('bs-flag-btn');
  if(fb)fb.classList.toggle('on',BS.flagged.has(card.id));
}
function advance(){
  const phs=PHS[BS.mode]||PHS.flash;
  if(BS.ph<phs.length-1){BS.ph++;render();}
  else if(BS.cur<BS.cards.length-1){BS.cur++;BS.ph=0;render();}
  else{stopPlay();showDone();}
}
function showDone(){
  document.getElementById('bs-pf').style.width='100%';
  document.getElementById('bs-card-body').innerHTML=`<div class="bs-done"><h2>Session complete</h2><div class="bs-done-s"><div><div class="n">${BS.seen.size}</div><div class="l">cards</div></div><div><div class="n">${BS.flagged.size}</div><div class="l">flagged</div></div><div><div class="n">${document.getElementById('bs-n-time').textContent}</div><div class="l">time</div></div></div><button class="bs-btn pr" style="margin-top:16px" onclick="bsConfig()">New session</button></div>`;
}
window.bsStart=function(){
  BS.cards=getCards();BS.cur=0;BS.ph=0;BS.seen.clear();BS.flagged.clear();BS.elapsed=0;
  const t=document.getElementById('bs-n-time');if(t)t.textContent='0:00';
  if(!BS.cards.length){alert('No cards available for this mode/deck.');return;}
  document.getElementById('bs-cfg').style.display='none';
  document.getElementById('bs-ses').style.display='block';
  document.getElementById('bs-ctrl').style.display='flex';
  render();
};
window.bsConfig=function(){
  stopPlay();
  document.getElementById('bs-cfg').style.display='block';
  document.getElementById('bs-ses').style.display='none';
  document.getElementById('bs-ctrl').style.display='none';
};
window.bsGo=function(d){
  const phs=PHS[BS.mode]||PHS.flash;
  if(d>0)advance();
  else if(BS.ph>0){BS.ph--;render();}
  else if(BS.cur>0){BS.cur--;BS.ph=phs.length-1;render();}
};
window.bsTogglePlay=function(){BS.playing?stopPlay():startPlay();};
function startPlay(){
  BS.playing=true;
  const b=document.getElementById('bs-play-btn');if(b)b.innerHTML='⏸ Pause';
  BS.timer=setInterval(advance,BS.spd);
  if(!BS.clock)BS.clock=setInterval(()=>{
    BS.elapsed++;const m=Math.floor(BS.elapsed/60),s=BS.elapsed%60;
    const t=document.getElementById('bs-n-time');if(t)t.textContent=m+':'+(s<10?'0':'')+s;
  },1000);
}
function stopPlay(){
  BS.playing=false;
  const b=document.getElementById('bs-play-btn');if(b)b.innerHTML='▶ Play';
  clearInterval(BS.timer);
}
window.bsDoFlag=function(){
  const card=BS.cards[BS.cur];if(!card)return;
  if(BS.flagged.has(card.id))BS.flagged.delete(card.id);else BS.flagged.add(card.id);
  const fn=document.getElementById('bs-n-flag');if(fn)fn.textContent=BS.flagged.size;
  const fb=document.getElementById('bs-flag-btn');if(fb)fb.classList.toggle('on',BS.flagged.has(card.id));
  if(window._supa&&BS.flagged.has(card.id)){
    try{window._supa.from('card_errors').insert({card_id:card.id,deck:card.deck,qid:card.qid,topic:card.topic||card.subject,field:'brainstorm_flag',note:'flagged in BrainStorm'}).then(()=>{}).catch(()=>{});}catch(e){}
  }
};
window.openBrainStorm=function(){
  const ov=document.getElementById('bs-overlay');if(!ov)return;
  ov.classList.add('on');
  document.body.style.overflow='hidden';
  const sv=localStorage.getItem('bs-spd');if(sv)bsSpd(sv);
  const fz=localStorage.getItem('bs-fz');if(fz&&FZLVL.includes(fz))BS.fz=fz;
  applyFz();
  bsConfig();
};
window.closeBrainStorm=function(){
  stopPlay();clearInterval(BS.clock);BS.clock=null;
  const ov=document.getElementById('bs-overlay');if(ov)ov.classList.remove('on');
  document.body.style.overflow='';
};
document.addEventListener('keydown',e=>{
  const ov=document.getElementById('bs-overlay');
  if(!ov||!ov.classList.contains('on'))return;
  if(e.key==='Escape'){closeBrainStorm();return;}
  if(document.getElementById('bs-ses').style.display==='none')return;
  if(e.key==='ArrowRight')bsGo(1);
  if(e.key==='ArrowLeft')bsGo(-1);
  if(e.key===' '){e.preventDefault();bsTogglePlay();}
  if(e.key==='f'||e.key==='F')bsDoFlag();
});
console.log('BoardMD BrainStorm v4');
})();
</script>
