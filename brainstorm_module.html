<style>
.bs-overlay{display:none;position:fixed;inset:0;z-index:99999;background:var(--bg);flex-direction:column;font-family:'Lato',sans-serif;overflow-y:auto;-webkit-overflow-scrolling:touch}
.bs-overlay.on{display:flex}
.bs-h{display:flex;align-items:center;justify-content:space-between;padding:18px 28px;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:10;flex-wrap:wrap;gap:10px}
.bs-t{display:flex;align-items:center;gap:14px;font-family:'Instrument Serif',serif;font-size:26px;color:var(--text)}
.bs-t svg{width:42px;height:42px;flex-shrink:0}
.bs-hr{display:flex;align-items:center;gap:8px}
.bs-fz{display:flex;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:3px;gap:3px}
.bs-fz button{width:34px;height:34px;border-radius:8px;border:none;background:transparent;color:var(--text);cursor:pointer;font-size:14px;font-weight:700;font-family:inherit}
.bs-fz button.on{background:var(--accent);color:#fff}
.bs-fz span{font-size:11px;color:var(--text-dim);padding:0 8px;min-width:54px;text-align:center;font-weight:700}
.bs-ib{width:38px;height:38px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;font-family:inherit}
.bs-ib:hover{border-color:var(--accent);color:var(--accent)}
.bs-body{padding:24px 28px;max-width:1100px;margin:0 auto;width:100%}
.bs-sh{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);margin-bottom:12px}
.bs-modes{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:24px}
.bs-mode{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 18px;cursor:pointer;transition:all .15s}
.bs-mode:hover{border-color:var(--accent)}
.bs-mode.on{border-color:var(--accent);background:var(--accent-dim)}
.bs-mode-n{font-weight:700;font-size:15px;color:var(--text);margin-bottom:5px}
.bs-mode-d{font-size:12.5px;color:var(--text-dim);line-height:1.5}
.bs-decks{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px}
.bs-deck{padding:9px 16px;border-radius:22px;background:var(--surface);border:1px solid var(--border);font-size:13px;font-weight:700;cursor:pointer;color:var(--text-dim);font-family:inherit;transition:all .15s}
.bs-deck:hover{border-color:var(--accent);color:var(--text)}
.bs-deck.on{background:var(--accent);border-color:var(--accent);color:#fff}
.bs-spd{display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 18px;margin-bottom:24px}
.bs-spd .l{font-size:12px;color:var(--text-dim);white-space:nowrap}
.bs-spd input{flex:1;max-width:280px}
.bs-spd .v{font-size:14px;font-weight:700;color:var(--text);min-width:42px}
.bs-spd .w{font-size:11px;color:var(--text-faint)}
.bs-cta{width:100%;padding:16px;border:none;border-radius:12px;background:var(--accent);color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:.02em}
.bs-cta:hover{filter:brightness(1.1)}
.bs-stats{display:flex;gap:18px;justify-content:flex-end;padding:0 4px 12px;font-size:12px;color:var(--text-dim)}
.bs-stats b{color:var(--text);font-weight:700}
.bs-prog{height:3px;background:var(--surface2);border-radius:2px;margin-bottom:10px;overflow:hidden}
.bs-pf{height:100%;background:var(--accent);width:0%;transition:width .15s}
.bs-sr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.bs-dots{display:flex;gap:5px}
.bs-dot{width:8px;height:8px;border-radius:50%;background:var(--surface2)}
.bs-dot.done{background:var(--accent);opacity:.5}
.bs-dot.act{background:var(--accent);transform:scale(1.4)}
.bs-stxt{font-size:11px;color:var(--text-dim)}
.bs-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;min-height:420px}
.bs-ch{padding:14px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.bs-ct{font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-dim)}
.bs-cm{display:flex;gap:10px;align-items:center}
.bs-db{padding:4px 11px;border-radius:18px;font-size:11px;font-weight:700;background:var(--accent-dim);color:var(--accent)}
.bs-qi{font-size:11px;color:var(--text-faint);font-family:Menlo,monospace}
.bs-sl{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);padding:18px 24px 0}
.bs-vg{padding:14px 24px 22px;line-height:1.85;color:var(--text)}
.bs-vg.compact{padding-bottom:8px}
.fz-md .bs-vg{font-size:16px}.fz-lg .bs-vg{font-size:18.5px}.fz-xl .bs-vg{font-size:22px}
.bs-hl{background:rgba(232,168,54,.22);color:var(--gold);border-radius:4px;padding:1px 6px;font-weight:600}
.bs-hlb{background:var(--accent-dim);color:var(--accent);border-radius:4px;padding:1px 6px;font-weight:600}
.bs-div{height:1px;background:var(--border)}
.bs-chunks{padding:24px 28px 18px;display:flex;flex-direction:column;gap:14px;position:relative}
.bs-chunks::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);border-radius:0 2px 2px 0}
.bs-chk{opacity:0;transform:translateY(8px);transition:opacity .4s,transform .4s}
.bs-chk.show{opacity:1;transform:translateY(0)}
.bs-chk-l{font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}
.bs-chk-t{padding:12px 18px;border-radius:0 10px 10px 0;font-family:'Instrument Serif',Georgia,serif;font-weight:400;line-height:1.7;color:var(--text)}
.fz-md .bs-chk-t{font-size:16px}.fz-lg .bs-chk-t{font-size:19px}.fz-xl .bs-chk-t{font-size:23px}
.bs-choices{padding:14px 24px;display:flex;flex-direction:column;gap:9px}
.bs-cho{display:flex;gap:13px;padding:13px 17px;border-radius:10px;border:1px solid var(--border);color:var(--text-dim);background:var(--bg);line-height:1.5}
.fz-md .bs-cho{font-size:15px}.fz-lg .bs-cho{font-size:17px}.fz-xl .bs-cho{font-size:20px}
.bs-cho.correct{background:rgba(34,197,94,.1);border-color:#4a9e3a;color:#7dda6a;font-weight:700}
.bs-cho.wrong{opacity:.4}
.bs-cl{font-weight:700;min-width:18px}
.bs-exp{padding:16px 24px;background:var(--surface2);border-top:1px solid var(--border);line-height:1.8;color:var(--text-dim)}
.fz-md .bs-exp{font-size:14px}.fz-lg .bs-exp{font-size:16px}.fz-xl .bs-exp{font-size:18.5px}
.bs-kp{margin:14px 24px;padding:15px 18px;background:var(--accent-dim);border-left:3px solid var(--accent);border-radius:0 10px 10px 0}
.bs-kpl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:6px}
.bs-kpt{font-weight:600;line-height:1.7;color:var(--text)}
.fz-md .bs-kpt{font-size:15px}.fz-lg .bs-kpt{font-size:17px}.fz-xl .bs-kpt{font-size:20px}
.bs-ctrl{padding:16px 28px;border-top:1px solid var(--border);display:flex;justify-content:center;gap:10px;align-items:center;flex-wrap:wrap;background:var(--bg);position:sticky;bottom:0}
.bs-btn{padding:11px 22px;border-radius:11px;border:1.5px solid var(--border);background:var(--surface);font-size:14px;font-weight:700;color:var(--text);cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:7px;transition:all .15s}
.bs-btn:hover{border-color:var(--accent)}
.bs-btn.pr{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 2px 12px rgba(59,127,255,.3)}
.bs-btn.fl{color:var(--gold)}
.bs-btn.fl.on{background:var(--gold-dim);border-color:var(--gold)}
.bs-spd2{display:flex;align-items:center;gap:8px;padding:9px 14px;border-radius:10px;background:var(--surface);border:1px solid var(--border);font-size:12px;color:var(--text-dim)}
.bs-spd2 input{width:100px}
.bs-spd2 b{color:var(--text)}
.bs-empty{text-align:center;padding:80px 20px;color:var(--text-dim)}
.bs-empty h3{font-size:22px;color:var(--text);font-family:'Instrument Serif',serif;margin-bottom:8px}
.bs-done{display:flex;flex-direction:column;align-items:center;padding:60px 20px;gap:18px}
.bs-done h2{font-family:'Instrument Serif',serif;font-size:38px;color:var(--text)}
.bs-done-s{display:flex;gap:36px}
.bs-done-s div{text-align:center}
.bs-done-s .n{font-size:28px;font-weight:700;color:var(--accent)}
.bs-done-s .l{font-size:11px;color:var(--text-dim);text-transform:uppercase;font-weight:700}
@media (max-width:700px){
  .bs-h{padding:14px 16px}.bs-t{font-size:20px}.bs-t svg{width:34px;height:34px}
  .bs-body{padding:16px}.bs-modes{grid-template-columns:1fr 1fr}
  .bs-ctrl{padding:12px 14px;gap:6px}.bs-btn{padding:9px 14px;font-size:12px}
}
.bmd-bottom-nav .nav-center-btn.bs-storm-btn{width:62px!important;height:62px!important;border-radius:19px!important}
.bmd-bottom-nav .nav-center-btn.bs-storm-btn svg{width:38px!important;height:38px!important;fill:none!important;stroke:none!important}
.bmd-bottom-nav .nav-center-btn.bs-storm-btn svg path[stroke="white"]{stroke:#fff!important;fill:none!important}
.bmd-bottom-nav .nav-center-btn.bs-storm-btn svg path[fill="#e8a836"]{fill:#e8a836!important;stroke:none!important}
@media (max-width:600px){
  .bmd-bottom-nav .nav-center-btn.bs-storm-btn{width:54px!important;height:54px!important}
  .bmd-bottom-nav .nav-center-btn.bs-storm-btn svg{width:32px!important;height:32px!important}
}
.bs-storm-lbl{font-size:10px;color:var(--gold);font-weight:700;text-align:center;margin-top:5px;letter-spacing:.04em;font-family:'Sora','Lato',sans-serif}
</style>

<div class="bs-overlay" id="bs-overlay">
  <div class="bs-h">
    <div class="bs-t">
      <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M10 4C7.5 4 6 5.5 6 7.5c0 .8.3 1.5.8 2-.5.5-.8 1.2-.8 2 0 1.5 1 2.5 2.5 2.5-.3.5-.5 1.1-.5 1.7 0 1.7 1.3 3 3 3h0V4zM18 4c2.5 0 4 1.5 4 3.5 0 .8-.3 1.5-.8 2 .5.5.8 1.2.8 2 0 1.5-1 2.5-2.5 2.5.3.5.5 1.1.5 1.7 0 1.7-1.3 3-3 3h0V4z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
        <path d="M16 6L11 14h3L11 22l8-10h-3l1-6z" fill="#e8a836"/>
      </svg>
      BrainStorm Mode
    </div>
    <div class="bs-hr">
      <div class="bs-fz">
        <button onclick="bsFz(-1)">A−</button>
        <span id="bs-fz-l">Large</span>
        <button onclick="bsFz(1)">A+</button>
      </div>
      <button class="bs-ib" onclick="bsConfig()">⚙</button>
      <button class="bs-ib" onclick="closeBrainStorm()">✕</button>
    </div>
  </div>

  <div class="bs-body" id="bs-cfg">
    <div class="bs-sh">Review Mode</div>
    <div class="bs-modes">
      <div class="bs-mode on" data-mode="flash"><div class="bs-mode-n">Flash mode</div><div class="bs-mode-d">Vignette → answer → Key Point</div></div>
      <div class="bs-mode" data-mode="phrase"><div class="bs-mode-n">Key Phrase</div><div class="bs-mode-d">Cognitive chunking in 3 steps</div></div>
      <div class="bs-mode" data-mode="kp"><div class="bs-mode-n">Key Points only</div><div class="bs-mode-d">Ultra-fast pre-exam review</div></div>
      <div class="bs-mode" data-mode="errors"><div class="bs-mode-n">Review errors</div><div class="bs-mode-d">Last 24h "Again" cards</div></div>
    </div>
    <div class="bs-sh">Deck</div>
    <div class="bs-decks">
      <button class="bs-deck on" data-deck="all">Step 2 Complete</button>
      <button class="bs-deck" data-deck="boardmd_s2">BoardMD S2</button>
      <button class="bs-deck" data-deck="core">Core S2</button>
      <button class="bs-deck" data-deck="boardmd_s1">BoardMD S1</button>
      <button class="bs-deck" data-deck="s1_core">Core S1</button>
    </div>
    <div class="bs-sh">Speed</div>
    <div class="bs-spd">
      <span class="l">per card</span>
      <input type="range" min="1" max="7" value="3" id="bs-spd-cfg">
      <span class="v" id="bs-spd-v">3s</span>
      <span class="w" id="bs-spd-w">≈ 20/min</span>
    </div>
    <button class="bs-cta" onclick="bsStart()">▶  Start BrainStorm</button>
  </div>

  <div class="bs-body" id="bs-ses" style="display:none">
    <div class="bs-stats">
      seen <b id="bs-n-seen">0</b> &nbsp;·&nbsp;
      flagged <b id="bs-n-flag">0</b> &nbsp;·&nbsp;
      time <b id="bs-n-time">0:00</b> &nbsp;·&nbsp;
      total <b id="bs-n-tot">0</b>
    </div>
    <div class="bs-prog"><div class="bs-pf" id="bs-pf"></div></div>
    <div class="bs-sr">
      <div class="bs-dots" id="bs-dots"></div>
      <div class="bs-stxt" id="bs-stxt"></div>
    </div>
    <div class="bs-card" id="bs-cb"></div>
  </div>

  <div class="bs-ctrl" id="bs-ctrl" style="display:none">
    <button class="bs-btn" onclick="bsGo(-1)">← Back</button>
    <button class="bs-btn pr" id="bs-play-btn" onclick="bsTogglePlay()">▶ Play</button>
    <button class="bs-btn fl" id="bs-flag-btn" onclick="bsDoFlag()">⚑ Flag</button>
    <button class="bs-btn" onclick="bsConfig()">⚙</button>
    <button class="bs-btn pr" onclick="bsGo(1)">Next →</button>
    <div class="bs-spd2">
      <span>speed</span>
      <input type="range" min="1" max="7" value="3" id="bs-spd-mini">
      <b id="bs-spd-v2">3s</b>
    </div>
  </div>
</div>

<script>
(function(){
'use strict';
const BS={mode:'flash',deck:'all',spd:3000,cards:[],cur:0,ph:0,playing:false,timer:null,clock:null,elapsed:0,flagged:new Set(),seen:new Set(),fz:'lg'};
const SPDS={1:800,2:1500,3:3000,4:5000,5:8000,6:12000,7:20000};
const SLBL={1:'0.8s',2:'1.5s',3:'3s',4:'5s',5:'8s',6:'12s',7:'20s'};
const SWPM={1:'≈75/min',2:'≈40/min',3:'≈20/min',4:'≈12/min',5:'≈7/min',6:'≈5/min',7:'≈3/min'};
const PHS={flash:['vignette','choices','answer','kp'],phrase:['phrase'],kp:['kp'],errors:['vignette','choices','answer','kp']};
const FZL=['md','lg','xl'];
const FZN={md:'Medium',lg:'Large',xl:'X-Large'};
const DKL={boardmd_s2:'BoardMD S2',core:'Core S2',boardmd_s1:'BoardMD S1',s1_core:'Core S1'};

function setupNav(){
  const btn=document.querySelector('.bmd-bottom-nav .nav-center-btn');
  if(!btn||btn.dataset.bsReady)return;
  btn.dataset.bsReady='1';
  btn.classList.add('bs-storm-btn');
  btn.removeAttribute('onclick');
  btn.innerHTML='<svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M10 4C7.5 4 6 5.5 6 7.5c0 .8.3 1.5.8 2-.5.5-.8 1.2-.8 2 0 1.5 1 2.5 2.5 2.5-.3.5-.5 1.1-.5 1.7 0 1.7 1.3 3 3 3h0V4zM18 4c2.5 0 4 1.5 4 3.5 0 .8-.3 1.5-.8 2 .5.5.8 1.2.8 2 0 1.5-1 2.5-2.5 2.5.3.5.5 1.1.5 1.7 0 1.7-1.3 3-3 3h0V4z" stroke="white" stroke-width="1.8" stroke-linejoin="round"/><path d="M16 6L11 14h3L11 22l8-10h-3l1-6z" fill="#e8a836"/></svg>';
  btn.onclick=function(e){e.preventDefault();e.stopPropagation();openBrainStorm();return false;};
  const nc=btn.parentElement;
  if(nc&&!nc.querySelector('.bs-storm-lbl')){
    const l=document.createElement('div');l.className='bs-storm-lbl';l.textContent='Storm';nc.appendChild(l);
  }
}
function loop(){setupNav();}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',loop);else loop();
[300,800,2000,5000].forEach(t=>setTimeout(loop,t));

function applyFz(){
  const ov=document.getElementById('bs-overlay');
  if(!ov)return;
  ov.classList.remove('fz-md','fz-lg','fz-xl');
  ov.classList.add('fz-'+BS.fz);
  const e=document.getElementById('bs-fz-l');if(e)e.textContent=FZN[BS.fz];
  localStorage.setItem('bs-fz',BS.fz);
}
window.bsFz=function(d){
  const i=FZL.indexOf(BS.fz);
  BS.fz=FZL[Math.max(0,Math.min(2,i+d))];applyFz();
};

function attachConfigClicks(){
  document.querySelectorAll('.bs-mode').forEach(el=>{
    el.onclick=function(){
      document.querySelectorAll('.bs-mode').forEach(x=>x.classList.remove('on'));
      el.classList.add('on');BS.mode=el.dataset.mode;
    };
  });
  document.querySelectorAll('.bs-deck').forEach(el=>{
    el.onclick=function(){
      document.querySelectorAll('.bs-deck').forEach(x=>x.classList.remove('on'));
      el.classList.add('on');BS.deck=el.dataset.deck;
    };
  });
  const sc=document.getElementById('bs-spd-cfg');
  if(sc)sc.oninput=function(){bsSpd(this.value);};
  const sm=document.getElementById('bs-spd-mini');
  if(sm)sm.oninput=function(){bsSpd(this.value);};
}

window.bsSpd=function(v){
  BS.spd=SPDS[v]||3000;
  ['bs-spd-v','bs-spd-v2'].forEach(id=>{const e=document.getElementById(id);if(e)e.textContent=SLBL[v];});
  const w=document.getElementById('bs-spd-w');if(w)w.textContent=SWPM[v];
  ['bs-spd-cfg','bs-spd-mini'].forEach(id=>{const e=document.getElementById(id);if(e)e.value=v;});
  localStorage.setItem('bs-spd',v);
  if(BS.playing){clearInterval(BS.timer);BS.timer=setInterval(advance,BS.spd);}
};

function getCards(){
  const D=window.DECKS||{};
  let c=BS.deck==='all'?[...(D.boardmd_s2||[]),...(D.core||[])]:D[BS.deck]||[];
  if(BS.mode==='errors'){
    const ago=Date.now()-86400000;const fs=window.fsrsState||{};
    c=c.filter(x=>{const s=fs[x.id];return s&&s.lastRating==='again'&&s.lastReview>ago;});
  }
  return c.slice().sort(()=>Math.random()-.5);
}

function getChoices(card){
  try{const r=card.c;const c=typeof r==='string'?JSON.parse(r):(r||[]);return Array.isArray(c)?c:[];}
  catch(e){return[];}
}

function hl(t){return t?String(t).replace(/\*\*(.+?)\*\*/g,'<span class="bs-hlb">$1</span>'):'';}

function hlVignette(vignette,phrase){
  if(!vignette||!phrase)return vignette||'';
  const terms=[];
  const rx=/\*\*(.+?)\*\*/g;let m;
  while((m=rx.exec(phrase))!==null){
    m[1].split(/[\s→+,;:]+/).forEach(w=>{
      const cl=w.replace(/[^a-zA-Z0-9-]/g,'');
      if(cl.length>=4)terms.push(cl);
    });
  }
  if(!terms.length)return vignette;
  let r=vignette;
  terms.forEach(t=>{
    try{const re=new RegExp('\\b('+t+')\\b','gi');r=r.replace(re,'<span class="bs-hl">$1</span>');}catch(e){}
  });
  return r;
}

function renderDots(){
  const phs=PHS[BS.mode]||PHS.flash;
  const el=document.getElementById('bs-dots');if(!el)return;
  el.innerHTML=phs.map((_,i)=>'<div class="bs-dot'+(i<BS.ph?' done':i===BS.ph?' act':'')+'"></div>').join('');
}

function render(){
  const el=document.getElementById('bs-cb');if(!el)return;
  if(!BS.cards.length){el.innerHTML='<div class="bs-empty"><h3>No cards available</h3><p>Try another mode or deck</p></div>';return;}
  if(BS.cur>=BS.cards.length){showDone();return;}
  const card=BS.cards[BS.cur];
  const phs=PHS[BS.mode]||PHS.flash;
  const ph=phs[BS.ph]||phs[0];
  BS.seen.add(card.id);
  ['bs-n-seen','bs-n-flag','bs-n-tot'].forEach((id,i)=>{
    const e=document.getElementById(id);if(!e)return;
    if(i===0)e.textContent=BS.seen.size;
    if(i===1)e.textContent=BS.flagged.size;
    if(i===2)e.textContent=BS.cards.length;
  });
  const pf=document.getElementById('bs-pf');if(pf)pf.style.width=Math.round(BS.cur/BS.cards.length*100)+'%';
  const phn={vignette:'Vignette',choices:'Choices',answer:'Answer',kp:'Key Point',phrase:'Phrase'};
  const st=document.getElementById('bs-stxt');if(st)st.textContent='Card '+(BS.cur+1)+' of '+BS.cards.length+' · '+(phn[ph]||'');
  renderDots();
  const topic=(card.topic||card.subject||'Card').toUpperCase();
  const dk=DKL[card.deck]||(card.deck||'').toUpperCase();
  const qid=card.qid?'QID '+card.qid:'#'+(card.id||'').toString().slice(-5);
  let h='<div class="bs-ch"><span class="bs-ct">'+topic+'</span><div class="bs-cm"><span class="bs-db">'+dk+'</span><span class="bs-qi">'+qid+'</span></div></div>';
  if(ph==='vignette'){
    h+='<div class="bs-sl">Vignette</div><div class="bs-vg">'+hlVignette(card.q||'',card.phrase||'')+'</div>';
  }else if(ph==='phrase'){
    const raw=card.phrase||card.kp||'';
    const parts=raw.split(/\s*\u2192\s*/).filter(p=>p.trim().length>0);
    const lbls=['Trigger','Diagnosis','Key action'];
    const clrs=['#e8a836','#3b7fff','#22c55e'];
    const bgs=['rgba(232,168,54,.13)','rgba(59,127,255,.1)','rgba(34,197,94,.09)'];
    if(parts.length>=2){
      let ch='';
      parts.slice(0,3).forEach((p,i)=>{
        ch+='<div class="bs-chk" data-i="'+i+'"><div class="bs-chk-l" style="color:'+clrs[i]+'">'+lbls[i]+'</div><div class="bs-chk-t" style="border-left:3px solid '+clrs[i]+';background:'+bgs[i]+'">'+hl(p.trim())+'</div></div>';
      });
      h+='<div class="bs-chunks">'+ch+'</div>';
    }else{
      h+='<div class="bs-chunks"><div class="bs-chk show"><div class="bs-chk-t" style="border-left:3px solid var(--accent);background:var(--accent-dim)">'+hl(raw||'phrase not available')+'</div></div></div>';
    }
  }else if(ph==='choices'){
    h+='<div class="bs-sl">Vignette</div><div class="bs-vg compact">'+hlVignette(card.q||'',card.phrase||'')+'</div><div class="bs-div"></div><div class="bs-choices">';
    getChoices(card).forEach((c,i)=>{h+='<div class="bs-cho"><span class="bs-cl">'+String.fromCharCode(65+i)+'.</span>'+(c.text||c.t||c)+'</div>';});
    h+='</div>';
  }else if(ph==='answer'){
    h+='<div class="bs-sl">Answer</div><div class="bs-vg compact">'+hlVignette(card.q||'',card.phrase||'')+'</div><div class="bs-div"></div><div class="bs-choices">';
    getChoices(card).forEach((c,i)=>{h+='<div class="bs-cho '+(c.correct?'correct':'wrong')+'"><span class="bs-cl">'+String.fromCharCode(65+i)+'.</span>'+(c.text||c.t||c)+'</div>';});
    h+='</div>';
    if(card.e)h+='<div class="bs-exp">'+card.e+'</div>';
  }else if(ph==='kp'){
    if(card.kp)h+='<div class="bs-kp"><div class="bs-kpl">Key Point</div><div class="bs-kpt">'+card.kp+'</div></div>';
    if(card.phrase&&BS.mode!=='kp')h+='<div class="bs-exp"><strong>Phrase:</strong> '+hl(card.phrase)+'</div>';
  }
  el.innerHTML=h;
  const fb=document.getElementById('bs-flag-btn');if(fb)fb.classList.toggle('on',BS.flagged.has(card.id));
  if(ph==='phrase'){
    el.querySelectorAll('.bs-chk').forEach(function(c,i){setTimeout(function(){c.classList.add('show');},i*600+80);});
  }
}

function advance(){
  const phs=PHS[BS.mode]||PHS.flash;
  if(BS.ph<phs.length-1){BS.ph++;render();}
  else if(BS.cur<BS.cards.length-1){BS.cur++;BS.ph=0;render();}
  else{stopPlay();showDone();}
}

function showDone(){
  const pf=document.getElementById('bs-pf');if(pf)pf.style.width='100%';
  const cb=document.getElementById('bs-cb');if(!cb)return;
  cb.innerHTML='<div class="bs-done"><h2>Session complete</h2><div class="bs-done-s"><div><div class="n">'+BS.seen.size+'</div><div class="l">cards</div></div><div><div class="n">'+BS.flagged.size+'</div><div class="l">flagged</div></div><div><div class="n">'+(document.getElementById('bs-n-time').textContent||'')+'</div><div class="l">time</div></div></div><button class="bs-btn pr" style="margin-top:18px" onclick="bsConfig()">New session</button></div>';
}

window.bsStart=function(){
  BS.cards=getCards();BS.cur=0;BS.ph=0;BS.seen.clear();BS.flagged.clear();BS.elapsed=0;
  const t=document.getElementById('bs-n-time');if(t)t.textContent='0:00';
  if(!BS.cards.length){alert('No cards available for this mode/deck.');return;}
  document.getElementById('bs-cfg').style.display='none';
  document.getElementById('bs-ses').style.display='block';
  document.getElementById('bs-ctrl').style.display='flex';
  render();
};
window.bsConfig=function(){
  stopPlay();
  document.getElementById('bs-cfg').style.display='block';
  document.getElementById('bs-ses').style.display='none';
  document.getElementById('bs-ctrl').style.display='none';
};
window.bsGo=function(d){
  const phs=PHS[BS.mode]||PHS.flash;
  if(d>0)advance();
  else if(BS.ph>0){BS.ph--;render();}
  else if(BS.cur>0){BS.cur--;BS.ph=phs.length-1;render();}
};
window.bsTogglePlay=function(){BS.playing?stopPlay():startPlay();};
function startPlay(){
  BS.playing=true;
  const b=document.getElementById('bs-play-btn');if(b)b.innerHTML='⏸ Pause';
  BS.timer=setInterval(advance,BS.spd);
  if(!BS.clock)BS.clock=setInterval(function(){
    BS.elapsed++;const m=Math.floor(BS.elapsed/60),s=BS.elapsed%60;
    const t=document.getElementById('bs-n-time');if(t)t.textContent=m+':'+(s<10?'0':'')+s;
  },1000);
}
function stopPlay(){
  BS.playing=false;
  const b=document.getElementById('bs-play-btn');if(b)b.innerHTML='▶ Play';
  clearInterval(BS.timer);
}
window.bsDoFlag=function(){
  const card=BS.cards[BS.cur];if(!card)return;
  if(BS.flagged.has(card.id))BS.flagged.delete(card.id);else BS.flagged.add(card.id);
  const fn=document.getElementById('bs-n-flag');if(fn)fn.textContent=BS.flagged.size;
  const fb=document.getElementById('bs-flag-btn');if(fb)fb.classList.toggle('on',BS.flagged.has(card.id));
  if(window._supa&&BS.flagged.has(card.id)){
    try{window._supa.from('card_errors').insert({card_id:card.id,deck:card.deck,qid:card.qid,topic:card.topic||card.subject,field:'brainstorm_flag',note:'flagged in BrainStorm'}).then(function(){}).catch(function(){});}catch(e){}
  }
};
window.openBrainStorm=function(){
  const ov=document.getElementById('bs-overlay');if(!ov)return;
  ov.classList.add('on');document.body.style.overflow='hidden';
  attachConfigClicks();
  const sv=localStorage.getItem('bs-spd');if(sv)bsSpd(sv);else bsSpd('3');
  const fz=localStorage.getItem('bs-fz');if(fz&&FZL.indexOf(fz)>=0)BS.fz=fz;
  applyFz();bsConfig();
};
window.closeBrainStorm=function(){
  stopPlay();clearInterval(BS.clock);BS.clock=null;
  const ov=document.getElementById('bs-overlay');if(ov)ov.classList.remove('on');
  document.body.style.overflow='';
};
document.addEventListener('keydown',function(e){
  const ov=document.getElementById('bs-overlay');if(!ov||!ov.classList.contains('on'))return;
  if(e.key==='Escape'){closeBrainStorm();return;}
  if(document.getElementById('bs-ses').style.display==='none')return;
  if(e.key==='ArrowRight')bsGo(1);
  if(e.key==='ArrowLeft')bsGo(-1);
  if(e.key===' '){e.preventDefault();bsTogglePlay();}
  if(e.key==='f'||e.key==='F')bsDoFlag();
});
console.log('BoardMD BrainStorm v5 loaded');
})();
</script>
